<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AllNet — Your Career Card</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Oswald:wght@400;500;600;700&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/app.css">
<style>
html, body { height: auto; overflow: auto; }
.career-page { min-height: 100vh; background: #000; padding-bottom: 60px; }

.career-topbar { position: sticky; top: 0; z-index: 100; padding: 14px 16px; background: rgba(0,0,0,0.95); backdrop-filter: blur(16px); display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); }
.career-topbar__menu { width: 48px; height: 48px; border-radius: 999px; background: #000; border: 1px solid #222; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
.career-topbar__title { flex: 1; font-family: 'Montserrat', sans-serif; font-size: 16px; font-weight: 600; color: #fff; text-align: center; line-height: 24px; }

/* ═══ Career Card — Figma 343x589 ═══ */
.cc-wrapper { padding: 20px 16px 0; }
.cc { position: relative; width: 343px; height: 589px; max-width: 100%; margin: 0 auto; border-radius: 16px; overflow: hidden; border: 1px solid #F74501; box-shadow: 0 8px 32px rgba(0,0,0,1); background: #000; }
.cc__cover { position: absolute; left: 11px; top: 83px; width: 319px; height: 319px; background-size: cover; background-position: center; z-index: 0; }
.cc__cutout { position: absolute; left: 50%; top: 83px; transform: translateX(-50%); width: 319px; height: 319px; object-fit: cover; object-position: center top; z-index: 1; }
.cc__gradient { position: absolute; left: 11px; top: 83px; width: 319px; height: 319px; background: linear-gradient(180deg, transparent 0%, #000 100%); z-index: 2; }

.cc__name-first { position: absolute; left: 11px; top: 11px; font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 40px; line-height: 32px; color: #fff; z-index: 3; }
.cc__name-last { position: absolute; right: 11px; top: 43px; font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 40px; line-height: 32px; color: #fff; z-index: 3; text-align: right; }
.cc__bar-orange { position: absolute; top: 16px; height: 25px; z-index: 3; overflow: hidden; }
.cc__bar-orange-fill { height: 100%; background: #F74501; }
.cc__bar-blue { position: absolute; top: 48px; left: 11px; height: 25px; z-index: 3; overflow: hidden; }
.cc__bar-blue-fill { height: 100%; background: #2563EB; }

.cc__wld { position: absolute; left: 0; right: 0; top: 366px; display: flex; z-index: 3; }
.cc__wld-col { flex: 1; text-align: center; }
.cc__wld-label { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 40px; line-height: 32px; color: #fff; display: block; }
.cc__wld-value { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 40px; line-height: 32px; color: #fff; display: block; margin-top: 8px; }

.cc__ratings { position: absolute; left: 19px; right: 13px; top: 478px; z-index: 3; }
.cc__rating-row { display: flex; justify-content: space-between; align-items: center; }
.cc__rating-label { font-family: 'Montserrat', sans-serif; font-weight: 600; font-size: 24px; line-height: 32px; color: #fff; }
.cc__rating-val { display: flex; align-items: center; gap: 4px; font-family: 'Montserrat', sans-serif; font-weight: 600; font-size: 16px; line-height: 24px; color: #fff; }
.cc__skill-icon { display: flex; gap: 2px; align-items: center; width: 16px; }
.cc__skill-bar { flex: 1; height: 16px; background: #F74501; }
.cc__social-star { width: 16px; height: 16px; }

.cc__div-tabs { position: absolute; left: 12px; right: 12px; top: 552px; z-index: 3; display: flex; gap: 8px; }
.cc__div-tab { flex: 1; font-family: 'Montserrat', sans-serif; font-weight: 600; font-size: 14px; line-height: 24px; text-align: center; color: #fff; background: transparent; border: 1px solid #434343; border-radius: 999px; padding: 0 8px; cursor: pointer; transition: all 0.2s; }
.cc__div-tab--active { background: #fff; color: #000; border-color: #434343; }

.cc__placeholder { position: absolute; inset: 0; z-index: 3; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: #666; text-align: center; padding: 20px; }
.cc__placeholder-icon { font-size: 40px; }
.cc__placeholder-text { font-size: 14px; font-family: 'Montserrat', sans-serif; line-height: 1.5; }

/* ═══ Actions ═══ */
.cc-actions { display: flex; gap: 16px; padding: 40px 16px 0; max-width: 375px; margin: 0 auto; }
.cc-action-btn { flex: 1; font-family: 'Montserrat', sans-serif; font-weight: 600; font-size: 14px; line-height: 16px; color: #fff; background: transparent; border: 1px solid #5a5a5a; padding: 12px 32px; cursor: pointer; transition: all 0.2s; }
.cc-action-btn:hover { border-color: #fff; }

/* ═══ Match History ═══ */
.match-history { padding: 40px 16px 0; }
.match-history__title { font-family: 'Montserrat', sans-serif; font-weight: 600; font-size: 14px; line-height: 16px; color: #fff; margin-bottom: 16px; }
.match-history__empty { text-align: center; padding: 32px 16px; color: #666; font-size: 14px; font-family: 'Montserrat', sans-serif; }

.mh-row { width: 343px; height: 108px; max-width: 100%; background: #181818; border: 1px solid #2e2e2e; position: relative; margin-bottom: 16px; cursor: pointer; overflow: hidden; }
.mh-row__thumb { position: absolute; left: -1px; top: -1px; width: 108px; height: 108px; overflow: hidden; background: #111; }
.mh-row__thumb-cover { position: absolute; inset: 0; background-size: cover; background-position: center; }
.mh-row__thumb-cutout { position: absolute; inset: -10%; width: 120%; height: 120%; object-fit: contain; object-position: center top; z-index: 1; }
.mh-row__thumb-initials { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 20px; color: #666; }
.mh-row__info { position: absolute; left: 119px; top: 11px; }
.mh-row__name { font-family: 'Montserrat', sans-serif; font-weight: 600; font-size: 16px; line-height: 24px; color: #fff; }
.mh-row__stars { display: flex; align-items: center; gap: 4px; }
.mh-row__stars-icons { display: flex; gap: 2px; }
.mh-row__star { width: 8px; height: 8px; }
.mh-row__star--empty { opacity: 0.3; }
.mh-row__stars-count { font-family: 'Montserrat', sans-serif; font-weight: 500; font-size: 10px; line-height: 12px; color: #c4c4c4; }
.mh-row__skill { display: flex; align-items: center; gap: 4px; margin-top: 8px; }
.mh-row__skill-label { font-family: 'Montserrat', sans-serif; font-weight: 600; font-size: 12px; line-height: 16px; color: #c4c4c4; }
.mh-row__skill-bars { display: flex; gap: 2px; }
.mh-row__skill-bar { width: 4px; height: 8px; }
.mh-row__skill-bar--filled { background: #F74501; }
.mh-row__skill-bar--empty { background: rgba(247,69,1,0.2); }
.mh-row__result { position: absolute; left: 119px; top: 79px; font-family: 'Montserrat', sans-serif; font-weight: 600; font-size: 12px; line-height: 16px; color: #c4c4c4; }

/* ═══ Photo Modal ═══ */
.photo-modal-overlay { position: fixed; inset: 0; z-index: 500; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; padding: 20px; }
.photo-modal-overlay.active { display: flex; }
.photo-modal { background: #1a1a1a; border-radius: 16px; padding: 28px 24px; max-width: 340px; width: 100%; text-align: center; }
.photo-modal__title { font-family: 'Montserrat', sans-serif; font-size: 18px; font-weight: 700; text-transform: uppercase; color: #fff; margin-bottom: 8px; }
.photo-modal__text { font-size: 14px; color: #999; margin-bottom: 20px; font-family: 'Montserrat', sans-serif; line-height: 1.5; }
.photo-modal__preview { width: 120px; height: 120px; border-radius: 50%; overflow: hidden; margin: 0 auto 20px; background: #111; display: none; align-items: center; justify-content: center; }
.photo-modal__preview.has-image { display: flex; }
.photo-modal__preview img { width: 100%; height: 100%; object-fit: cover; }
.photo-modal__upload-btn { width: 100%; padding: 14px; font-family: 'Montserrat', sans-serif; font-size: 14px; font-weight: 700; text-transform: uppercase; background: #F74501; color: #fff; border: none; border-radius: 8px; cursor: pointer; margin-bottom: 10px; }
.photo-modal__cancel-btn { width: 100%; padding: 12px; font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 600; text-transform: uppercase; background: transparent; color: #999; border: 1px solid #333; border-radius: 8px; cursor: pointer; }
.photo-modal__processing { display: none; flex-direction: column; align-items: center; gap: 12px; padding: 20px 0; }
.photo-modal__processing.active { display: flex; }
.photo-modal__spinner { font-size: 28px; animation: spin 1.2s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.photo-modal__status { font-size: 13px; color: #999; }
</style>
</head>
<body>
<div class="career-page" id="careerPage">
  <div class="career-topbar">
    <button class="career-topbar__menu" onclick="openNavDrawer()" aria-label="Menu">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#F74501" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    </button>
    <div class="career-topbar__title">Your Career Card</div>
  </div>
  <div class="nav-drawer-overlay" id="navOverlay" onclick="closeNavDrawer()"></div>
  <div class="nav-drawer" id="navDrawer">
    <div class="nav-drawer__header">
      <svg height="20" viewBox="0 0 685 318" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M546.941 97.7H653.081V121.712H613.757V219.5H586.439V121.712H546.941V97.7Z" fill="white"/><path d="M538.737 121.712H482.883V146.594H516.813V170.606H482.883V195.488H538.737V219.5H455.565V97.7H538.737V121.712Z" fill="white"/><path d="M407.304 97.7H434.622V219.5H407.304V185.744L362.238 144.854V219.5H334.92V97.7H362.238V108.314L407.304 149.03V97.7Z" fill="white"/><path d="M267.07 195.488H322.924V219.5H255.064L239.752 204.188V97.7H267.07V195.488Z" fill="white"/><path d="M172.423 195.488H228.277V219.5H160.417L145.105 204.188V97.7H172.423V195.488Z" fill="white"/><path d="M109.74 97.7L125.052 113.012V219.5H97.734V194.792H58.236V291.5L30.918 307.5V113.012L46.23 97.7H109.74ZM58.236 170.606H97.734V121.712H58.236V170.606Z" fill="white"/><path d="M626 26.5L653 10.5V98.5H626V26.5Z" fill="white"/></svg>
      <button class="nav-drawer__close" onclick="closeNavDrawer()">✕</button>
    </div>
    <nav class="nav-drawer__links">
      <a href="allnet-app.html" class="nav-drawer__link" data-nav="play"><span class="nav-drawer__link-icon">🏀</span><span class="nav-drawer__link-label">Play</span></a>
      <a href="allnet-activity.html" class="nav-drawer__link" data-nav="activity"><span class="nav-drawer__link-icon">📊</span><span class="nav-drawer__link-label">Activity</span></a>
      <a href="allnet-career.html" class="nav-drawer__link nav-drawer__link--active" data-nav="career"><span class="nav-drawer__link-icon">🏆</span><span class="nav-drawer__link-label">Career</span></a>
      <a href="allnet-stars.html" class="nav-drawer__link" data-nav="stars"><span class="nav-drawer__link-icon">⭐</span><span class="nav-drawer__link-label">Stars</span></a>
      <a href="#" class="nav-drawer__link nav-drawer__link--soon" onclick="return false" data-nav="settings"><span class="nav-drawer__link-icon">⚙️</span><span class="nav-drawer__link-label">Settings</span><span class="nav-drawer__link-badge">Soon</span></a>
    </nav>
    <div class="nav-drawer__footer"><div class="nav-drawer__user" id="navUser" style="display:none;"><div class="nav-drawer__user-avatar" id="navAvatar">U</div><div class="nav-drawer__user-info"><div class="nav-drawer__user-name" id="navUserName">Player</div><div class="nav-drawer__user-stars" id="navUserStars">⭐ 0</div></div></div></div>
  </div>
  <div class="cc-wrapper"><div class="cc" id="careerCard"><div class="cc__placeholder"><div class="cc__placeholder-icon">📷</div><div class="cc__placeholder-text">Upload a photo to generate your career card</div></div></div></div>
  <div class="cc-actions"><button class="cc-action-btn" onclick="openPhotoModal()">CHANGE PHOTO</button><button class="cc-action-btn" onclick="openCoverPicker()">UPDATE COVER</button></div>
  <div class="match-history"><div class="match-history__title" id="matchHistoryTitle">MATCH HISTORY (0)</div><div id="matchHistoryList"><div class="match-history__empty">No matches yet.</div></div></div>
</div>
<div class="photo-modal-overlay" id="photoModal"><div class="photo-modal"><div class="photo-modal__title">Change Photo</div><div class="photo-modal__text">Upload a new photo. We'll remove the background automatically.</div><div class="photo-modal__preview" id="photoPreview"><img id="photoPreviewImg" src="" alt=""></div><div class="photo-modal__processing" id="photoProcessing"><div class="photo-modal__spinner">⚡</div><div class="photo-modal__status" id="photoStatus">Removing background...</div></div><input type="file" id="photoInput" accept="image/*" style="display:none" onchange="handlePhotoSelect(event)"><button class="photo-modal__upload-btn" id="photoUploadBtn" onclick="document.getElementById('photoInput').click()">Choose Photo</button><button class="photo-modal__cancel-btn" onclick="closePhotoModal()">Cancel</button></div></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/supabase-helpers.js"></script>
<script>
let currentUser=null,currentProfile=null,divisionStats={},activeDivision='1v1';
const SUPABASE_COVERS_URL='https://orrpowyewsioyxztwkdq.supabase.co/storage/v1/object/public/covers';
const COVERS={crossover:SUPABASE_COVERS_URL+'/Crossover.png',rally:SUPABASE_COVERS_URL+'/Rally.png',flowstate:SUPABASE_COVERS_URL+'/Flowstate.png',fastbreak:SUPABASE_COVERS_URL+'/Fastbreak.png',shatter:SUPABASE_COVERS_URL+'/Shatter.png',showtime:SUPABASE_COVERS_URL+'/Showtime.png',fadeaway:SUPABASE_COVERS_URL+'/Fadeaway.png'};
function openNavDrawer(){document.getElementById('navOverlay').classList.add('open');document.getElementById('navDrawer').classList.add('open')}
function closeNavDrawer(){document.getElementById('navOverlay').classList.remove('open');document.getElementById('navDrawer').classList.remove('open')}
function updateNavDrawerUser(){const n=document.getElementById('navUser');if(!n||!currentUser||!currentProfile)return;n.style.display='flex';document.getElementById('navUserName').textContent=currentProfile.name||'Player';document.getElementById('navUserStars').textContent='⭐ '+(currentProfile.stars_balance||0).toLocaleString();const a=document.getElementById('navAvatar');if(a&&currentProfile.avatar_url)a.innerHTML='<img src="'+currentProfile.avatar_url+'" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">';else if(a)a.textContent=currentProfile.initials||'U'}
function starSvg(f){return f?'<svg class="mh-row__star" viewBox="0 0 8 8" fill="#facc15"><polygon points="4,0.5 5.1,2.8 7.6,3.1 5.8,4.8 6.2,7.3 4,6.1 1.8,7.3 2.2,4.8 0.4,3.1 2.9,2.8"/></svg>':'<svg class="mh-row__star mh-row__star--empty" viewBox="0 0 8 8" fill="#444"><polygon points="4,0.5 5.1,2.8 7.6,3.1 5.8,4.8 6.2,7.3 4,6.1 1.8,7.3 2.2,4.8 0.4,3.1 2.9,2.8"/></svg>'}

function renderCard(){
  const c=document.getElementById('careerCard');if(!c)return;
  const cut=currentProfile?.avatar_cutout_url,cover=currentProfile?.selected_cover||'crossover',coverFile=COVERS[cover]||COVERS.crossover;
  const fn=(currentProfile?.first_name||currentProfile?.name?.split(' ')[0]||'').toUpperCase();
  const ln=(currentProfile?.last_name||currentProfile?.name?.split(' ').slice(1).join(' ')||'').toUpperCase();
  const ds=divisionStats[activeDivision],w=ds?.wins||0,l=ds?.losses||0,d=ds?.draws||0;
  const sk=ds?.skill_rating?Number(ds.skill_rating).toFixed(1):'—';
  const so=currentProfile?.social_rating?Number(currentProfile.social_rating).toFixed(1):'—';
  const dl=activeDivision.toUpperCase();
  if(!cut){c.innerHTML=`<div class="cc__cover" style="background-image:url('${coverFile}')"></div><div class="cc__gradient"></div><div class="cc__placeholder"><div class="cc__placeholder-icon">📷</div><div class="cc__placeholder-text">Upload a photo to generate your career card</div></div>`;return}
  const divs=['1v1','2v2','3v3','4v4','5v5'];
  const tabs=divs.map(dv=>`<button class="cc__div-tab ${dv===activeDivision?'cc__div-tab--active':''}" onclick="switchDivision('${dv}')">${dv}</button>`).join('');
  const fbl=Math.min(fn.length*26+20,280);
  const lbr=Math.min(ln.length*26+20,280);
  c.innerHTML=`
    <div class="cc__cover" style="background-image:url('${coverFile}')"></div>
    <img class="cc__cutout" src="${cut}" alt="${fn} ${ln}" onerror="this.style.display='none'">
    <div class="cc__gradient"></div>
    <div class="cc__name-first">${fn}</div>
    <div class="cc__bar-orange" style="left:${fbl}px;right:11px;"><div class="cc__bar-orange-fill" style="width:100%;"></div></div>
    <div class="cc__name-last">${ln}</div>
    <div class="cc__bar-blue" style="width:${343-lbr-11}px;"><div class="cc__bar-blue-fill" style="width:100%;"></div></div>
    <div class="cc__wld">
      <div class="cc__wld-col"><span class="cc__wld-label">W</span><span class="cc__wld-value">${w}</span></div>
      <div class="cc__wld-col"><span class="cc__wld-label">L</span><span class="cc__wld-value">${l}</span></div>
      <div class="cc__wld-col"><span class="cc__wld-label">D</span><span class="cc__wld-value">${d}</span></div>
    </div>
    <div class="cc__ratings">
      <div class="cc__rating-row"><span class="cc__rating-label">SOCIAL RATING</span><span class="cc__rating-val"><svg class="cc__social-star" viewBox="0 0 16 16" fill="#facc15"><polygon points="8,1 10.2,5.6 15.2,6.2 11.6,9.6 12.4,14.6 8,12.2 3.6,14.6 4.4,9.6 0.8,6.2 5.8,5.6"/></svg>${so}</span></div>
      <div class="cc__rating-row"><span class="cc__rating-label">${dl} SKILL RATING</span><span class="cc__rating-val"><span class="cc__skill-icon"><div class="cc__skill-bar"></div><div class="cc__skill-bar"></div></span>${sk}</span></div>
    </div>
    <div class="cc__div-tabs">${tabs}</div>`;
}
function switchDivision(dv){activeDivision=dv;renderCard()}

async function loadDivisionStats(){
  const{data}=await supabase.from('player_division_stats').select('*').eq('user_id',currentUser.id);
  if(data)data.forEach(r=>{divisionStats[r.division]=r});
  let best='1v1',bg=0;for(const[dv,s]of Object.entries(divisionStats)){if(s.games_count>bg){bg=s.games_count;best=dv}}
  if(bg>0)activeDivision=best;
}

async function loadMatchHistory(){
  const{data:pg}=await supabase.from('game_players').select('game_id,team').eq('user_id',currentUser.id);
  if(!pg||!pg.length){updateMH([]);return}
  const gids=pg.map(p=>p.game_id),tm={};pg.forEach(p=>{tm[p.game_id]=p.team});
  const{data:games}=await supabase.from('game_sessions').select('id,format,winner,ended_at').in('id',gids).in('status',['completed','nulled']).order('ended_at',{ascending:false}).limit(50);
  if(!games||!games.length){updateMH([]);return}
  const{data:ap}=await supabase.from('game_players').select('game_id,user_id,team').in('game_id',gids);
  const oids=new Set();if(ap)ap.forEach(a=>{if(a.user_id!==currentUser.id)oids.add(a.user_id)});
  let op={};if(oids.size>0){const{data:pr}=await supabase.from('profiles').select('id,name,first_name,last_name,avatar_url,avatar_cutout_url,selected_cover,social_rating,skill_rating').in('id',Array.from(oids));if(pr)pr.forEach(p=>{op[p.id]=p})}
  const rows=games.map(g=>{const mt=tm[g.id];let r='DRAW';if(g.winner==='team_'+mt)r='WIN';else if(g.winner&&g.winner!=='draw'&&g.winner!=='null')r='LOSE';let o=null;if(ap){const x=ap.find(a=>a.game_id===g.id&&a.user_id!==currentUser.id&&a.team!==mt)||ap.find(a=>a.game_id===g.id&&a.user_id!==currentUser.id);if(x)o=op[x.user_id]}return{game:g,result:r,opp:o}});
  updateMH(rows);
}

function updateMH(rows){
  document.getElementById('matchHistoryTitle').textContent='MATCH HISTORY ('+rows.length+')';
  const el=document.getElementById('matchHistoryList');
  if(!rows.length){el.innerHTML='<div class="match-history__empty">No matches yet.</div>';return}
  el.innerHTML=rows.map(({game,result,opp})=>{
    const nm=opp?(opp.first_name&&opp.last_name?opp.first_name+' '+opp.last_name:opp.name):'Unknown Player';
    const sv=opp?.social_rating?Number(opp.social_rating):0;const sc=opp?.social_rating?'('+Math.round(sv)+')':'';
    const fs=Math.round(sv);const sh=Array.from({length:5},(_,i)=>starSvg(i<fs)).join('');
    const skv=opp?.skill_rating?Math.round(Number(opp.skill_rating)):0;
    const bh=Array.from({length:5},(_,i)=>'<div class="mh-row__skill-bar '+(i<skv?'mh-row__skill-bar--filled':'mh-row__skill-bar--empty')+'"></div>').join('');
    const cs=opp?.selected_cover||'crossover',cu=COVERS[cs]||COVERS.crossover,ct=opp?.avatar_cutout_url;
    const ini=nm.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
    const th=ct?'<div class="mh-row__thumb-cover" style="background-image:url(\''+cu+'\')"></div><img class="mh-row__thumb-cutout" src="'+ct+'" alt="" onerror="this.style.display=\'none\'">':opp?.avatar_url?'<img src="'+opp.avatar_url+'" style="width:100%;height:100%;object-fit:cover;" alt="">':'<div class="mh-row__thumb-initials">'+ini+'</div>';
    return '<div class="mh-row" onclick="openPlayerCard(\''+(opp?.id||'')+'\')">'+'<div class="mh-row__thumb">'+th+'</div>'+'<div class="mh-row__info"><div class="mh-row__name">'+nm+'</div><div class="mh-row__stars"><div class="mh-row__stars-icons">'+sh+'</div><span class="mh-row__stars-count">'+sc+'</span></div><div class="mh-row__skill"><span class="mh-row__skill-label">SKILL LEVEL</span><div class="mh-row__skill-bars">'+bh+'</div></div></div><div class="mh-row__result">'+result+'</div></div>';
  }).join('');
}

function openPlayerCard(uid){if(!uid)return;console.log('Open player card:',uid)}
function openPhotoModal(){document.getElementById('photoModal').classList.add('active');document.getElementById('photoPreview').classList.remove('has-image');document.getElementById('photoProcessing').classList.remove('active');const b=document.getElementById('photoUploadBtn');b.textContent='Choose Photo';b.disabled=false;b.style.display=''}
function closePhotoModal(){document.getElementById('photoModal').classList.remove('active')}

async function handlePhotoSelect(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();r.onload=ev=>{document.getElementById('photoPreviewImg').src=ev.target.result;document.getElementById('photoPreview').classList.add('has-image')};r.readAsDataURL(f);
  const btn=document.getElementById('photoUploadBtn'),proc=document.getElementById('photoProcessing'),stat=document.getElementById('photoStatus');
  btn.disabled=true;btn.textContent='Uploading...';
  try{
    const ext=f.name.split('.').pop(),path=currentUser.id+'/avatar-'+Date.now()+'.'+ext;
    const{error:ue}=await supabase.storage.from('avatars').upload(path,f,{upsert:true});if(ue)throw ue;
    const{data:ud}=supabase.storage.from('avatars').getPublicUrl(path);
    await supabase.from('profiles').update({avatar_url:ud.publicUrl}).eq('id',currentUser.id);
    currentProfile.avatar_url=ud.publicUrl;
    btn.style.display='none';proc.classList.add('active');stat.textContent='Removing background...';
    let tk=null;const{data:sd}=await supabase.auth.getSession();tk=sd?.session?.access_token;
    if(!tk){const{data:rd}=await supabase.auth.refreshSession();tk=rd?.session?.access_token}
    const res=await fetch(SUPABASE_URL+'/functions/v1/avatar-process',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+tk,'apikey':SUPABASE_ANON_KEY},body:JSON.stringify({imagePath:path})});
    const result=await res.json();if(!res.ok)throw new Error(result.error||'Processing failed');
    currentProfile.avatar_cutout_url=result.cutoutUrl;stat.textContent='Done!';
    setTimeout(()=>{closePhotoModal();renderCard();updateNavDrawerUser()},600);
  }catch(err){console.error('Photo error:',err);proc.classList.remove('active');btn.style.display='';btn.disabled=false;btn.textContent='Try Again';alert('Photo upload failed: '+err.message)}
}
function openCoverPicker(){window.location.href='allnet-stars.html'}

async function initCareerPage(){
  const{data:{session}}=await supabase.auth.getSession();
  if(!session){window.location.href='allnet-app.html';return}
  currentUser=session.user;currentProfile=await getUserProfile(currentUser.id);
  if(!currentProfile){window.location.href='allnet-app.html';return}
  updateNavDrawerUser();await loadDivisionStats();renderCard();loadMatchHistory();
}
initCareerPage();
</script>
