<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AllNet — Activity</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/app.css">
<style>
html, body { height: auto; overflow: auto; }

.activity-page {
  min-height: 100vh;
  background: var(--bg);
  padding-bottom: 40px;
}

.activity-topbar {
  position: sticky; top: 0; z-index: 100;
  padding: 14px 16px;
  background: rgba(10,10,10,0.95);
  backdrop-filter: blur(16px);
  display: flex; align-items: center; gap: 12px;
  border-bottom: 1px solid var(--border);
}

.activity-topbar__title {
  flex: 1; font-family: var(--font-display); font-size: 18px;
  font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
}

/* Filter tabs */
.feed-filters {
  display: flex; gap: 0; padding: 0 16px;
  border-bottom: 1px solid var(--border);
}

.feed-filter {
  flex: 1; padding: 12px 8px; text-align: center;
  font-family: var(--font-display); font-size: 12px; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--text-muted); cursor: pointer; border: none; background: none;
  border-bottom: 2px solid transparent; transition: var(--transition);
}

.feed-filter:hover { color: var(--text-secondary); }

.feed-filter.active {
  color: var(--orange); border-bottom-color: var(--orange);
}

.feed-filter--disabled {
  opacity: 0.35; cursor: not-allowed;
}

/* Match cards */
.feed-list {
  padding: 16px;
  display: flex; flex-direction: column; gap: 12px;
}

.match-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: var(--transition);
}

.match-card__header {
  padding: 14px 16px 10px;
  display: flex; align-items: center; justify-content: space-between;
}

.match-card__format {
  font-family: var(--font-display); font-size: 13px; font-weight: 700;
  letter-spacing: 0.06em; text-transform: uppercase;
  padding: 3px 10px; border-radius: 100px;
  background: rgba(255,90,31,0.1); color: var(--orange);
  border: 1px solid rgba(255,90,31,0.2);
}

.match-card__meta {
  font-size: 11px; color: var(--text-muted); font-family: var(--font-mono);
  display: flex; align-items: center; gap: 6px;
}

.match-card__court {
  padding: 0 16px 12px;
  font-size: 13px; color: var(--text-secondary);
  display: flex; align-items: center; gap: 6px;
}

.match-card__court-icon { opacity: 0.6; }

/* Teams display */
.match-card__teams {
  padding: 0 16px 16px;
  display: flex; flex-direction: column; gap: 8px;
}

.match-card__team {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
}

.match-card__team--winner {
  background: rgba(34,197,94,0.06);
  border: 1px solid rgba(34,197,94,0.15);
}

.match-card__team--loser {
  background: rgba(255,255,255,0.02);
  border: 1px solid var(--border);
}

.match-card__team-result {
  font-family: var(--font-display); font-size: 13px; font-weight: 700;
  width: 24px; height: 24px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; color: white;
}

.match-card__team-result--w { background: var(--green-live); }
.match-card__team-result--l { background: rgba(107,107,107,0.4); }

.match-card__team-players {
  flex: 1; display: flex; flex-wrap: wrap; gap: 6px;
}

.match-card__player {
  display: flex; align-items: center; gap: 6px;
}

.match-card__player-avatar {
  width: 28px; height: 28px; border-radius: 50%;
  background: linear-gradient(135deg, var(--orange), #FF8C42);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display); font-size: 10px; font-weight: 700;
  color: white; flex-shrink: 0; overflow: hidden;
  position: relative;
}

.match-card__player-avatar .av-comp {
  position: absolute; inset: 0; border-radius: 50%; overflow: hidden;
}

.match-card__player-avatar .av-comp__cover {
  position: absolute; inset: 0;
  background-size: cover; background-position: center;
}

.match-card__player-avatar .av-comp__cutout {
  position: absolute; inset: -10%; width: 120%; height: 120%;
  object-fit: contain; object-position: center top;
  z-index: 1;
}

.match-card__team--loser .match-card__player-avatar {
  background: linear-gradient(135deg, #555, #777);
}

.match-card__player-name {
  font-size: 13px; font-weight: 600;
}

.match-card__team--loser .match-card__player-name {
  color: var(--text-muted);
}

/* Spray row placeholder */
.match-card__sprays {
  padding: 0 16px 12px;
  display: flex; align-items: center; gap: 8px;
}

.spray-btn {
  background: none; border: 1px solid var(--border-light);
  border-radius: 100px; padding: 4px 12px;
  font-size: 11px; color: var(--text-muted); cursor: pointer;
  font-family: var(--font-body); transition: var(--transition);
  display: flex; align-items: center; gap: 4px;
}

.spray-btn:hover { border-color: var(--text-secondary); color: var(--text-secondary); }

/* ── Media Carousel ── */
.match-card__media {
  position: relative;
  width: 100%;
  background: #000;
  overflow: hidden;
}

.match-card__media-track {
  display: flex;
  transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

.match-card__media-slide {
  min-width: 100%;
  position: relative;
}

.match-card__media-slide img {
  width: 100%;
  max-height: 500px;
  object-fit: contain;
  background: #000;
  display: block;
}

.match-card__media-slide video {
  width: 100%;
  max-height: 500px;
  object-fit: contain;
  background: #000;
  display: block;
}

.match-card__video-wrap {
  position: relative;
  width: 100%;
  background: #000;
}

.match-card__video-wrap video {
  width: 100%;
  max-height: 500px;
  object-fit: contain;
  display: block;
}

.match-card__video-mute {
  position: absolute;
  bottom: 12px;
  right: 12px;
  width: 32px; height: 32px;
  border-radius: 50%;
  background: rgba(0,0,0,0.6);
  border: none;
  color: white;
  font-size: 14px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  z-index: 3;
  backdrop-filter: blur(4px);
  transition: background 0.2s;
}

.match-card__video-mute:hover { background: rgba(0,0,0,0.8); }

.match-card__video-pause {
  position: absolute;
  inset: 0;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  z-index: 2;
}

.match-card__video-pause-icon {
  width: 52px; height: 52px;
  border-radius: 50%;
  background: rgba(0,0,0,0.5);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  color: white;
  opacity: 0;
  transition: opacity 0.2s;
  backdrop-filter: blur(4px);
}

.match-card__video-pause.paused .match-card__video-pause-icon {
  opacity: 1;
}

.match-card__media-caption {
  padding: 10px 16px;
  background: var(--bg-card);
}

.match-card__media-author {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 4px;
}

.match-card__media-author-avatar {
  width: 18px; height: 18px; border-radius: 50%;
  overflow: hidden; flex-shrink: 0;
  background: var(--border); display: flex; align-items: center; justify-content: center;
  font-size: 8px; font-weight: 700; color: #fff;
}

.match-card__media-author-avatar img {
  width: 100%; height: 100%; object-fit: cover;
}

.match-card__media-text {
  font-size: 14px;
  color: var(--text-primary);
  line-height: 1.5;
}

.match-card__media-dots {
  display: flex;
  justify-content: center;
  gap: 6px;
  padding: 8px 0;
  background: var(--bg-card);
}

.match-card__media-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--border-light);
  transition: background 0.2s;
}

.match-card__media-dot--active {
  background: var(--orange);
}

.match-card__media-nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 32px; height: 32px;
  border-radius: 50%;
  background: rgba(0,0,0,0.6);
  border: none;
  color: white;
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  z-index: 10;
  backdrop-filter: blur(4px);
}

.match-card__media-nav--prev { left: 8px; }
.match-card__media-nav--next { right: 8px; }

/* Empty state */
.feed-empty {
  text-align: center; padding: 80px 20px; color: var(--text-muted);
}

.feed-empty__icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }

.feed-empty__title {
  font-family: var(--font-display); font-size: 20px; font-weight: 700;
  text-transform: uppercase; color: var(--text-secondary); margin-bottom: 8px;
}

.feed-empty__desc { font-size: 14px; line-height: 1.6; max-width: 280px; margin: 0 auto; }

.feed-loading {
  text-align: center; padding: 60px 20px; color: var(--text-muted); font-size: 14px;
}
</style>
</head>
<body>

<div class="activity-page" id="activityPage">
  <!-- Nav Drawer -->
  <div class="nav-drawer-overlay" id="navOverlay" onclick="closeNavDrawer()"></div>
  <div class="nav-drawer" id="navDrawer">
    <div class="nav-drawer__header">
      <svg height="20" viewBox="0 0 685 318" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M546.941 97.7H653.081V121.712H613.757V219.5H586.439V121.712H546.941V97.7Z" fill="white"/><path d="M538.737 121.712H482.883V146.594H516.813V170.606H482.883V195.488H538.737V219.5H455.565V97.7H538.737V121.712Z" fill="white"/><path d="M407.304 97.7H434.622V219.5H407.304V185.744L362.238 144.854V219.5H334.92V97.7H362.238V108.314L407.304 149.03V97.7Z" fill="white"/><path d="M267.07 195.488H322.924V219.5H255.064L239.752 204.188V97.7H267.07V195.488Z" fill="white"/><path d="M172.423 195.488H228.277V219.5H160.417L145.105 204.188V97.7H172.423V195.488Z" fill="white"/><path d="M109.74 97.7L125.052 113.012V219.5H97.734V194.792H58.236V291.5L30.918 307.5V113.012L46.23 97.7H109.74ZM58.236 170.606H97.734V121.712H58.236V170.606Z" fill="white"/><path d="M626 26.5L653 10.5V98.5H626V26.5Z" fill="white"/></svg>
      <button class="nav-drawer__close" onclick="closeNavDrawer()">✕</button>
    </div>
    <nav class="nav-drawer__links">
      <a href="allnet-app.html" class="nav-drawer__link" data-nav="play">
        <span class="nav-drawer__link-icon">🏀</span>
        <span class="nav-drawer__link-label">Play</span>
      </a>
      <a href="allnet-activity.html" class="nav-drawer__link nav-drawer__link--active" data-nav="activity">
        <span class="nav-drawer__link-icon">📊</span>
        <span class="nav-drawer__link-label">Activity</span>

      <a href="allnet-career.html" class="nav-drawer__link" data-nav="career">
        <span class="nav-drawer__link-icon">🏆</span>
        <span class="nav-drawer__link-label">Career</span>
      </a>
      <a href="allnet-stars.html" class="nav-drawer__link" data-nav="stars">
        <span class="nav-drawer__link-icon">⭐</span>
        <span class="nav-drawer__link-label">Stars</span>
      </a>
      <a href="#" class="nav-drawer__link nav-drawer__link--soon" onclick="return false" data-nav="settings">
        <span class="nav-drawer__link-icon">⚙️</span>

      </a>
    </nav>
    <div class="nav-drawer__footer">
      <div class="nav-drawer__user" id="navUser" style="display:none;">
        <div class="nav-drawer__user-avatar" id="navAvatar">U</div>

          <div class="nav-drawer__user-name" id="navUserName">Player</div>
          <div class="nav-drawer__user-stars" id="navUserStars">⭐ 0</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Top Bar -->
  <div class="activity-topbar">
    <button class="top-bar__menu" onclick="openNavDrawer()" aria-label="Menu">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><rect y="3" width="20" height="2" rx="1" fill="white"/><rect y="9" width="20" height="2" rx="1" fill="white"/><rect y="15" width="20" height="2" rx="1" fill="white"/></svg>
    </button>
    <div class="activity-topbar__title">Activity</div>
  </div>

  <!-- Filter Tabs -->
  <div class="feed-filters">
    <button class="feed-filter active" data-filter="all" onclick="setFeedFilter('all', this)">All Games</button>
    <button class="feed-filter feed-filter--disabled" onclick="return false">My Games</button>
    <button class="feed-filter feed-filter--disabled" onclick="return false">Nearby</button>
  </div>

  <!-- Feed -->
  <div class="feed-list" id="feedList">
    <div class="feed-loading">Loading games...</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/supabase-helpers.js"></script>
<script>
/* ══════════════════════════════
   ACTIVITY FEED — AllNet
   Live-fetches profile data so avatars
   always show current cutout + cover
   ══════════════════════════════ */
let currentUser = null;
let currentProfile = null;
let liveProfiles = {}; // userId -> profile (fetched fresh)

// ── Covers Catalog ──
const SUPABASE_COVERS_URL = 'https://orrpowyewsioyxztwkdq.supabase.co/storage/v1/object/public/covers';
const COVERS = {
  crossover:  SUPABASE_COVERS_URL + '/Crossover.png',
  rally:      SUPABASE_COVERS_URL + '/Rally.png',
  flowstate:  SUPABASE_COVERS_URL + '/Flowstate.png',
  fastbreak:  SUPABASE_COVERS_URL + '/Fastbreak.png',
  shatter:    SUPABASE_COVERS_URL + '/Shatter.png',
  showtime:   SUPABASE_COVERS_URL + '/Showtime.png',
  fadeaway:   SUPABASE_COVERS_URL + '/Fadeaway.png'
};

// ── Nav Drawer ──
function openNavDrawer() {
  document.getElementById('navOverlay').classList.add('open');
  document.getElementById('navDrawer').classList.add('open');
}

function closeNavDrawer() {
  document.getElementById('navOverlay').classList.remove('open');
  document.getElementById('navDrawer').classList.remove('open');
}

function updateNavDrawerUser() {
  const navUser = document.getElementById('navUser');
  if (!navUser || !currentUser || !currentProfile) return;
  navUser.style.display = 'flex';
  document.getElementById('navUserName').textContent = currentProfile.name || 'Player';
  document.getElementById('navUserStars').textContent = '⭐ ' + (currentProfile.stars_balance || 0).toLocaleString();
  const navAvatar = document.getElementById('navAvatar');
  if (navAvatar) {
    navAvatar.innerHTML = buildAvatarHtml(currentProfile);
  }
}

// ── Feed Filter ──
function setFeedFilter(filter, el) {
  if (el.classList.contains('feed-filter--disabled')) return;
  document.querySelectorAll('.feed-filter').forEach(f => f.classList.remove('active'));
  el.classList.add('active');
}

// ── Time Ago ──
function timeAgo(date) {
  const s = Math.floor((Date.now() - date.getTime()) / 1000);
  if (s < 60) return 'Just now';
  if (s < 3600) return Math.floor(s / 60) + 'm ago';
  if (s < 86400) return Math.floor(s / 3600) + 'h ago';
  if (s < 604800) return Math.floor(s / 86400) + 'd ago';
  return date.toLocaleDateString();
}

/* ══════════════════════════════
   COMPOSITE AVATAR BUILDER
   Used for any player avatar in the UI.
   If the player has a cutout + cover, renders
   the mini composite. Otherwise falls back to
   raw photo or initials.
   ══════════════════════════════ */
function buildAvatarHtml(player) {
  const cutout = player.avatar_cutout_url;
  const cover = player.selected_cover || 'crossover';
  const coverUrl = COVERS[cover] || COVERS.crossover;
  const rawUrl = player.avatar_url;
  const initials = player.initials || (player.name || '??').split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);

  if (cutout) {
    return `<div class="av-comp">
      <div class="av-comp__cover" style="background-image:url('${coverUrl}')"></div>
      <img class="av-comp__cutout" src="${cutout}" alt="" onerror="this.style.display='none'">
    </div>`;
  }
  if (rawUrl) {
    return `<img src="${rawUrl}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" alt="">`;
  }
  return initials;
}

// ── Render Player (uses live profile data if available) ──
function renderPlayer(player) {
  // If this player has a user_id, use live profile data
  const live = player.user_id ? liveProfiles[player.user_id] : null;
  const avatarSource = live || player;
  const displayName = live ? (live.first_name && live.last_name ? live.first_name + ' ' + live.last_name : live.name) : player.name;

  return `<div class="match-card__player">
    <div class="match-card__player-avatar">${buildAvatarHtml(avatarSource)}</div>
    <span class="match-card__player-name">${displayName}</span>
  </div>`;
}

// ── Render Match Card ──
function renderMatchCard(match, media) {
  const teamA = typeof match.team_a === 'string' ? JSON.parse(match.team_a) : match.team_a;
  const teamB = typeof match.team_b === 'string' ? JSON.parse(match.team_b) : match.team_b;
  const isDraw = match.winner === 'draw';
  const winnerTeam = isDraw ? teamA : (match.winner === 'a' ? teamA : teamB);
  const loserTeam = isDraw ? teamB : (match.winner === 'a' ? teamB : teamA);
  const time = timeAgo(new Date(match.played_at));

  // Build media carousel if media exists
  let mediaHtml = '';
  if (media && media.length > 0) {
    const carouselId = 'carousel_' + match.id.replace(/-/g, '');
    const slides = media.map((m, idx) => {
      const profile = liveProfiles[m.user_id];
      const authorName = profile ? (profile.first_name || profile.name?.split(' ')[0] || 'Player') : 'Player';
      const authorAvatar = profile?.avatar_url
        ? `<img src="${profile.avatar_url}" alt="">`
        : (authorName[0] || '?');
      const mediaIcon = m.media_type === 'video' ? '🎥' : '📸';

      const mediaEl = m.media_type === 'video'
        ? `<div class="match-card__video-wrap">
            <video src="${m.media_url}" playsinline autoplay loop muted preload="metadata"></video>
            <button class="match-card__video-mute" onclick="toggleVideoMute(this, event)">🔇</button>
            <div class="match-card__video-pause" onclick="toggleVideoPlay(this, event)">
              <div class="match-card__video-pause-icon">▶</div>
            </div>
          </div>`
        : `<img src="${m.media_url}" alt="Game highlight" loading="lazy">`;

      const captionHtml = m.caption
        ? `<div class="match-card__media-text">${m.caption}</div>`
        : '';

      return `<div class="match-card__media-slide">
        ${mediaEl}
        <div class="match-card__media-caption">
          <div class="match-card__media-author">
            <div class="match-card__media-author-avatar">${authorAvatar}</div>
            ${mediaIcon} ${authorName}
          </div>
          ${captionHtml}
        </div>
      </div>`;
    }).join('');

    const dotsHtml = media.length > 1
      ? `<div class="match-card__media-dots">${media.map((_, i) => `<div class="match-card__media-dot${i === 0 ? ' match-card__media-dot--active' : ''}" data-idx="${i}"></div>`).join('')}</div>`
      : '';

    const navHtml = media.length > 1
      ? `<button class="match-card__media-nav match-card__media-nav--prev" onclick="event.stopPropagation();slideCarousel('${carouselId}', -1)">‹</button>
         <button class="match-card__media-nav match-card__media-nav--next" onclick="event.stopPropagation();slideCarousel('${carouselId}', 1)">›</button>`
      : '';

    mediaHtml = `<div class="match-card__media" id="${carouselId}" data-idx="0" data-count="${media.length}">
      ${navHtml}
      <div class="match-card__media-track">${slides}</div>
      ${dotsHtml}
    </div>`;
  }

  return `<div class="match-card">
    <div class="match-card__header">
      <span class="match-card__format">${match.format}</span>
      <span class="match-card__meta">${time}</span>
    </div>
    <div class="match-card__court">
      <span class="match-card__court-icon">📍</span>
      ${match.court_name}
    </div>
    ${mediaHtml}
    <div class="match-card__teams">
      <div class="match-card__team ${isDraw ? 'match-card__team--loser' : 'match-card__team--winner'}">
        <div class="match-card__team-result ${isDraw ? 'match-card__team-result--l' : 'match-card__team-result--w'}">${isDraw ? 'D' : 'W'}</div>
        <div class="match-card__team-players">
          ${winnerTeam.map(p => renderPlayer(p)).join('')}
        </div>
      </div>
      <div class="match-card__team match-card__team--loser">
        <div class="match-card__team-result match-card__team-result--l">${isDraw ? 'D' : 'L'}</div>
        <div class="match-card__team-players">
          ${loserTeam.map(p => renderPlayer(p)).join('')}
        </div>
      </div>
    </div>
    <div class="match-card__sprays">
      <button class="spray-btn" disabled>🎨 Spray · Coming soon</button>
    </div>
  </div>`;
}

// ── Carousel Navigation ──
function slideCarousel(carouselId, direction) {
  const el = document.getElementById(carouselId);
  if (!el) return;
  const count = parseInt(el.dataset.count);
  let idx = parseInt(el.dataset.idx) + direction;
  if (idx < 0) idx = 0;
  if (idx >= count) idx = count - 1;
  el.dataset.idx = idx;

  const track = el.querySelector('.match-card__media-track');
  track.style.transform = `translateX(-${idx * 100}%)`;

  // Update dots
  el.querySelectorAll('.match-card__media-dot').forEach((dot, i) => {
    dot.classList.toggle('match-card__media-dot--active', i === idx);
  });

  // Pause all videos, play the visible one if it's a video
  el.querySelectorAll('video').forEach(v => { v.pause(); });
  const activeSlide = el.querySelectorAll('.match-card__media-slide')[idx];
  const activeVideo = activeSlide?.querySelector('video');
  if (activeVideo) {
    activeVideo.play().catch(() => {});
    const pauseOverlay = activeSlide.querySelector('.match-card__video-pause');
    if (pauseOverlay) pauseOverlay.classList.remove('paused');
  }
}

// ── Video Controls ──
function toggleVideoPlay(overlayEl, e) {
  e.stopPropagation();
  const wrap = overlayEl.closest('.match-card__video-wrap');
  const video = wrap?.querySelector('video');
  if (!video) return;

  if (video.paused) {
    video.play().catch(() => {});
    overlayEl.classList.remove('paused');
  } else {
    video.pause();
    overlayEl.classList.add('paused');
  }
}

function toggleVideoMute(btn, e) {
  e.stopPropagation();
  const wrap = btn.closest('.match-card__video-wrap');
  const video = wrap?.querySelector('video');
  if (!video) return;

  video.muted = !video.muted;
  btn.textContent = video.muted ? '🔇' : '🔊';
}

// ── Touch Swipe for Carousel ──
document.addEventListener('touchstart', function(e) {
  const carousel = e.target.closest('.match-card__media');
  if (!carousel) return;
  carousel._touchX = e.touches[0].clientX;
}, { passive: true });

document.addEventListener('touchend', function(e) {
  const carousel = e.target.closest('.match-card__media');
  if (!carousel || !carousel._touchX) return;
  const diff = carousel._touchX - e.changedTouches[0].clientX;
  if (Math.abs(diff) > 40) {
    slideCarousel(carousel.id, diff > 0 ? 1 : -1);
  }
  carousel._touchX = null;
}, { passive: true });

/* ══════════════════════════════
   LOAD FEED
   1. Fetch match_feed
   2. Collect all user_ids from JSONB
   3. Batch-fetch live profiles
   4. Render with live data
   ══════════════════════════════ */
async function loadFeed() {
  const { data, error } = await supabase
    .from('match_feed')
    .select('*')
    .order('played_at', { ascending: false })
    .limit(50);

  const list = document.getElementById('feedList');

  if (error) {
    console.error('Feed load error:', error);
    list.innerHTML = `<div class="feed-empty">
      <div class="feed-empty__icon">⚠️</div>
      <div class="feed-empty__title">Load Error</div>
      <div class="feed-empty__desc">${error.message}</div>
    </div>`;
    return;
  }

  if (!data || data.length === 0) {
    list.innerHTML = `<div class="feed-empty">
      <div class="feed-empty__icon">🏀</div>
      <div class="feed-empty__title">No Games Yet</div>
      <div class="feed-empty__desc">When players complete games on AllNet, their results will show up here.</div>
    </div>`;
    return;
  }

  // Collect all user_ids from team JSONB
  const userIds = new Set();
  data.forEach(match => {
    const teamA = typeof match.team_a === 'string' ? JSON.parse(match.team_a) : match.team_a;
    const teamB = typeof match.team_b === 'string' ? JSON.parse(match.team_b) : match.team_b;
    [...teamA, ...teamB].forEach(p => {
      if (p.user_id) userIds.add(p.user_id);
    });
  });

  // Batch-fetch live profile data for all real users
  if (userIds.size > 0) {
    const { data: profiles } = await supabase
      .from('profiles')
      .select('id, name, first_name, last_name, initials, avatar_url, avatar_cutout_url, selected_cover')
      .in('id', Array.from(userIds));

    if (profiles) {
      profiles.forEach(p => { liveProfiles[p.id] = p; });
    }
  }

  // Render with live data
  // Batch-fetch public media for all feed posts
  const feedIds = data.map(m => m.id);
  let mediaByFeed = {};
  if (feedIds.length > 0) {
    const { data: mediaData } = await supabase
      .from('game_media')
      .select('*')
      .in('match_feed_id', feedIds)
      .eq('is_public', true)
      .order('created_at', { ascending: true });

    if (mediaData) {
      mediaData.forEach(m => {
        if (!mediaByFeed[m.match_feed_id]) mediaByFeed[m.match_feed_id] = [];
        mediaByFeed[m.match_feed_id].push(m);
      });

      // Fetch profiles for media uploaders
      const mediaUserIds = new Set(mediaData.map(m => m.user_id));
      mediaUserIds.forEach(uid => userIds.add(uid)); // merge with existing
      if (mediaUserIds.size > 0) {
        const { data: mediaProfiles } = await supabase
          .from('profiles')
          .select('id, name, first_name, last_name, avatar_url')
          .in('id', Array.from(mediaUserIds));
        if (mediaProfiles) mediaProfiles.forEach(p => { if (!liveProfiles[p.id]) liveProfiles[p.id] = p; });
      }
    }
  }

  list.innerHTML = data.map(match => renderMatchCard(match, mediaByFeed[match.id] || [])).join('');
}

// ── Init ──
async function initActivityPage() {
  const { data: { session } } = await supabase.auth.getSession();
  if (session) {
    currentUser = session.user;
    currentProfile = await getUserProfile(currentUser.id);
    updateNavDrawerUser();
  }
  await loadFeed();
}

initActivityPage();
</script>
