<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AllNet — __DISPLAY_NAME__'s Dunk</title>
  <meta property="og:title" content="__OG_TITLE__">
  <meta property="og:description" content="__OG_DESC__">
  <meta property="og:url" content="__OG_URL__">
  <meta property="og:image" content="https://allnetgames.com/img/dunk-og-preview.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:type" content="video.other">
  <meta property="og:site_name" content="AllNet">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="__OG_TITLE__">
  <meta name="twitter:description" content="__OG_DESC__">
  <meta name="twitter:image" content="https://allnetgames.com/img/dunk-og-preview.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; color: #fff; font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
    .container { max-width: 480px; width: 100%; padding: 0 16px; }
    .header { padding: 16px 0; display: flex; align-items: center; gap: 10px; }
    .logo { height: 28px; }
    .logo img { height: 100%; }
    .video-wrap { width: 100%; aspect-ratio: 9/16; max-height: 70vh; background: #111; border-radius: 12px; overflow: hidden; position: relative; }
    .video-wrap video { width: 100%; height: 100%; object-fit: contain; }
    .no-video { display: flex; align-items: center; justify-content: center; height: 100%; color: #666; font-size: 14px; }
    .player-row { display: flex; align-items: center; gap: 12px; padding: 16px 0; }
    .avatar { width: 48px; height: 48px; border-radius: 50%; background: #1a1a1a; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 2px solid #333; }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .avatar-initials { font-family: 'Oswald', sans-serif; font-size: 18px; color: #fff; }
    .player-info { flex: 1; }
    .player-name { font-family: 'Oswald', sans-serif; font-size: 18px; font-weight: 700; }
    .player-meta { font-size: 13px; color: #999; margin-top: 2px; }
    .vote-section { text-align: center; padding: 20px 0; }
    .vote-count { font-family: 'Oswald', sans-serif; font-size: 36px; color: #F74501; }
    .vote-label { font-size: 13px; color: #999; margin-bottom: 16px; }
    .vote-btn { display: inline-flex; align-items: center; gap: 8px; padding: 14px 32px; border: 2px solid #F74501; background: transparent; color: #F74501; font-family: 'Oswald', sans-serif; font-size: 16px; font-weight: 700; letter-spacing: 0.5px; cursor: pointer; border-radius: 8px; transition: all 0.2s; }
    .vote-btn:hover { background: #F74501; color: #fff; }
    .vote-btn:disabled { opacity: 0.5; cursor: default; background: #F74501; color: #fff; border-color: #F74501; }
    .vote-btn svg { width: 20px; height: 20px; }
    .vote-hint { font-size: 12px; color: #666; margin-top: 10px; }
    .vote-result { font-size: 14px; color: #22C55E; margin-top: 8px; }
    .cta-section { padding: 24px 0 40px; text-align: center; border-top: 1px solid #1a1a1a; margin-top: 16px; }
    .cta-text { font-size: 14px; color: #999; margin-bottom: 12px; }
    .cta-btn { display: inline-block; padding: 14px 28px; background: #F74501; color: #fff; font-family: 'Oswald', sans-serif; font-size: 16px; font-weight: 700; text-decoration: none; letter-spacing: 0.5px; border-radius: 0; }
    .cta-sub { font-size: 11px; color: #666; margin-top: 8px; }
    .error-page { text-align: center; padding: 60px 20px; }
    .error-page h2 { font-family: 'Oswald', sans-serif; margin-bottom: 8px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo"><img src="/img/allnet-games-logo-white.png" alt="AllNet"></div>
      <span style="font-size:12px;color:#666;">DUNK CONTEST</span>
    </div>

    <div id="content"></div>
  </div>

  <script>

    const sub = __SUBMISSION_DATA__;
    const el = document.getElementById('content');

    if (!sub || !sub.id) {
      el.innerHTML = '<div class="error-page"><h2>Submission not found</h2><p style="color:#999">This dunk may have been removed.</p></div>';
    } else {
      const initials = (sub.playerName || '').split(' ').map(w => w[0] || '').join('').toUpperCase();
      const avatarHtml = sub.avatarCutoutUrl
        ? `<img src="${sub.avatarCutoutUrl}" alt="">`
        : `<span class="avatar-initials">${initials}</span>`;

      const timeAgo = getTimeAgo(sub.createdAt);

      el.innerHTML = `
        <div class="video-wrap">
          ${sub.videoUrl
            ? `<video src="${sub.videoUrl}" controls playsinline preload="metadata"></video>`
            : '<div class="no-video">Video not available</div>'}
        </div>

        <div class="player-row">
          <div class="avatar">${avatarHtml}</div>
          <div class="player-info">
            <div class="player-name">${sub.playerName}</div>
            <div class="player-meta">${sub.state || ''} · ${timeAgo}</div>
          </div>
        </div>

        <div class="vote-section">
          <div class="vote-count" id="voteCount">+${sub.netVotes}</div>
          <div class="vote-label">community votes</div>
          <button class="vote-btn" id="voteBtn" onclick="handleVote()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>
            UPVOTE
          </button>
          <div class="vote-hint" id="voteHint">Your vote counts as 1 · Join AllNet for 3x votes</div>
          <div class="vote-result" id="voteResult" style="display:none;"></div>
        </div>

        <div class="cta-section">
          <div class="cta-text">Want your vote to count 3x and earn Stars?</div>
          <a class="cta-btn" href="https://allnetgames.com">JOIN ALLNET</a>
          <div class="cta-sub">Pickup basketball, reputation, and community.</div>
        </div>
      `;
    }

    async function handleVote() {
      const btn = document.getElementById('voteBtn');
      const hint = document.getElementById('voteHint');
      const result = document.getElementById('voteResult');
      btn.disabled = true;
      btn.innerHTML = '...';

      try {
        const resp = await fetch('/api/dunk-vote', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            submission_id: sub.id,
          }),
        });
        const data = await resp.json();

        if (data.success) {
          document.getElementById('voteCount').textContent = '+' + data.new_upvotes;
          btn.innerHTML = '✓ VOTED';
          btn.style.background = '#F74501';
          btn.style.color = '#fff';
          hint.style.display = 'none';
          result.style.display = 'block';
          result.textContent = 'Vote counted!';
        } else {
          btn.innerHTML = data.error || 'Vote failed';
          btn.style.background = '#fff';
          btn.style.color = '#000';
          btn.style.borderColor = '#fff';
          hint.style.display = 'none';
        }
      } catch (err) {
        btn.innerHTML = 'Error';
        btn.disabled = false;
      }
    }

    function getTimeAgo(iso) {
      if (!iso) return '';
      const diff = Date.now() - new Date(iso).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 60) return mins + 'm ago';
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return hrs + 'h ago';
      return Math.floor(hrs / 24) + 'd ago';
    }
  </script>
</body>
</html>
