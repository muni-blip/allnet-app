<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AllNet Scoreboard</title>
<link rel="icon" href="/img/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0A0A0A;--surface:#141414;--surface-border:#2A2A2A;
  --orange:#FF5A1F;--orange-dim:#FF5A1F33;
  --blue:#3B82F6;--green:#22C55E;--red:#EF4444;
  --text:#FFFFFF;--text-muted:#888;--text-dim:#555;
  --font-display:'Oswald',sans-serif;--font-body:'DM Sans',sans-serif;--font-mono:'JetBrains Mono',monospace;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font-body)}
/* ═══ LOADING ═══ */
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999}
#loading .logo{font-family:var(--font-display);font-size:32px;font-weight:700;color:var(--orange);letter-spacing:2px}
#loading .sub{color:var(--text-muted);font-size:14px;margin-top:8px}
.spinner{width:28px;height:28px;border:3px solid var(--surface-border);border-top-color:var(--orange);border-radius:50%;animation:spin .7s linear infinite;margin-top:20px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ═══ HEADER ═══ */
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:var(--surface);border-bottom:1px solid var(--surface-border);height:56px}
.header__left{display:flex;align-items:center;gap:12px}
.header__game{font-family:var(--font-display);font-size:18px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.header__timer{font-family:var(--font-mono);font-size:16px;color:var(--text-muted);font-weight:500}
.header__right{display:flex;align-items:center;gap:10px}
.btn{font-family:var(--font-body);font-weight:600;font-size:13px;border:none;border-radius:0;cursor:pointer;padding:8px 16px;transition:opacity .15s}
.btn:active{opacity:.7}
.btn--orange{background:var(--orange);color:#fff}
.btn--ghost{background:transparent;color:var(--text-muted);border:1px solid var(--surface-border)}
.btn--red{background:var(--red);color:#fff}
.btn--icon{padding:8px 10px;display:flex;align-items:center;gap:6px}

/* ═══ SCOREBAR ═══ */
.scorebar{display:flex;align-items:stretch;height:80px;background:var(--surface)}
.scorebar__team{flex:1;display:flex;align-items:center;justify-content:center;gap:16px;padding:0 24px;cursor:default}
.scorebar__team--a{background:linear-gradient(135deg,#1a1a1a,#111)}
.scorebar__team--b{background:linear-gradient(135deg,#111,#1a1a1a)}
.scorebar__name{font-family:var(--font-display);font-size:22px;font-weight:700;letter-spacing:2px;text-transform:uppercase}
.scorebar__score{font-family:var(--font-mono);font-size:48px;font-weight:700;line-height:1}
.scorebar__score--lead{color:var(--orange)}
.scorebar__divider{width:2px;background:var(--surface-border);display:flex;align-items:center;justify-content:center;position:relative}
.scorebar__vs{position:absolute;background:var(--surface-border);color:var(--text-dim);font-family:var(--font-display);font-size:11px;font-weight:700;padding:4px 8px;letter-spacing:1px}

/* ═══ COURT (two-panel player grid) ═══ */
.court{display:flex;flex:1;overflow:hidden;height:calc(100vh - 56px - 80px)}
.court__team{flex:1;overflow-y:auto;padding:12px 10px}
.court__team--a{border-right:1px solid var(--surface-border)}
.court__team-label{font-family:var(--font-display);font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);padding:4px 8px 8px;text-align:center}

/* ═══ PLAYER ROW ═══ */
.player{display:flex;align-items:center;padding:12px 14px;margin-bottom:6px;background:var(--surface);border:1px solid var(--surface-border);cursor:pointer;transition:border-color .15s,background .15s;gap:12px;border-radius:0;user-select:none}
.player:active{background:#1f1f1f;border-color:var(--orange)}
.player--selected{border-color:var(--orange);background:#1a1000}
.player__jersey{font-family:var(--font-mono);font-size:20px;font-weight:700;color:var(--orange);min-width:36px;text-align:center}
.player__name{font-family:var(--font-body);font-size:15px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player__pts{font-family:var(--font-mono);font-size:18px;font-weight:700;color:var(--text-muted);min-width:28px;text-align:right}
.player__mini-stats{display:flex;gap:6px;margin-left:4px}
.player__mini-stat{font-family:var(--font-mono);font-size:10px;color:var(--text-dim)}

/* ═══ STAT PALETTE ═══ */
.palette-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:none;align-items:flex-end;justify-content:center}
.palette-overlay.active{display:flex}
.palette{background:var(--surface);border:1px solid var(--surface-border);border-bottom:none;width:100%;max-width:600px;padding:16px 20px 24px;animation:slideUp .2s ease-out}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.palette__player{font-family:var(--font-display);font-size:18px;font-weight:700;text-align:center;margin-bottom:14px;letter-spacing:1px}
.palette__player span{color:var(--orange)}
.palette__row{display:flex;gap:8px;justify-content:center;margin-bottom:10px}
.palette__btn{font-family:var(--font-mono);font-weight:700;font-size:16px;border:none;cursor:pointer;padding:14px 0;flex:1;max-width:100px;transition:all .12s;border-radius:0}
.palette__btn:active{transform:scale(.93)}
.palette__btn--pts{background:var(--orange);color:#fff;font-size:20px}
.palette__btn--stat{background:var(--surface-border);color:var(--text)}
.palette__btn--cancel{background:transparent;color:var(--text-muted);border:1px solid var(--surface-border);font-family:var(--font-body);font-size:13px;font-weight:600;max-width:160px}

/* ═══ ASSIST PROMPT ═══ */
.assist-bar{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--surface-border);padding:10px 16px;z-index:90;display:none;animation:slideUp .2s ease-out}
.assist-bar.active{display:block}
.assist-bar__label{font-family:var(--font-body);font-size:12px;color:var(--text-muted);text-align:center;margin-bottom:8px}
.assist-bar__players{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.assist-bar__player{font-family:var(--font-mono);font-weight:700;font-size:13px;background:var(--surface-border);color:var(--text);border:none;cursor:pointer;padding:8px 14px}
.assist-bar__player:active{background:var(--orange);color:#fff}
.assist-bar__skip{font-family:var(--font-body);font-size:12px;color:var(--text-dim);background:none;border:none;cursor:pointer;padding:8px 16px;text-decoration:underline}

/* ═══ UNDO TOAST ═══ */
.undo-toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--surface-border);padding:8px 16px;font-family:var(--font-mono);font-size:12px;color:var(--text-muted);z-index:80;opacity:0;transition:opacity .3s;pointer-events:none}
.undo-toast.visible{opacity:1}

/* ═══ SETTINGS PANEL ═══ */
.settings-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:center;justify-content:center}
.settings-overlay.active{display:flex}
.settings{background:var(--surface);border:1px solid var(--surface-border);padding:24px;width:90%;max-width:420px}
.settings__title{font-family:var(--font-display);font-size:20px;font-weight:700;margin-bottom:16px;letter-spacing:1px}
.settings__row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--surface-border)}
.settings__label{font-size:14px;font-weight:500}
.settings__desc{font-size:11px;color:var(--text-muted);margin-top:2px}
.settings__control{display:flex;gap:6px}
.settings__option{font-family:var(--font-mono);font-size:12px;font-weight:700;padding:6px 12px;border:1px solid var(--surface-border);background:transparent;color:var(--text-muted);cursor:pointer}
.settings__option--active{border-color:var(--orange);color:var(--orange);background:var(--orange-dim)}
.toggle{width:44px;height:24px;border-radius:12px;background:var(--surface-border);border:none;cursor:pointer;position:relative;transition:background .2s}
.toggle.on{background:var(--orange)}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:transform .2s}
.toggle.on::after{transform:translateX(20px)}
.settings__close{margin-top:16px;width:100%}

/* ═══ BOX SCORE MODAL ═══ */
.boxscore-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:300;display:none;align-items:center;justify-content:center;overflow-y:auto}
.boxscore-overlay.active{display:flex}
.boxscore{background:var(--surface);border:1px solid var(--surface-border);padding:24px;width:95%;max-width:700px;max-height:90vh;overflow-y:auto}
.boxscore__title{font-family:var(--font-display);font-size:22px;font-weight:700;text-align:center;letter-spacing:1px;margin-bottom:4px}
.boxscore__score{font-family:var(--font-mono);font-size:36px;font-weight:700;text-align:center;margin-bottom:16px}
.boxscore__score span{color:var(--orange)}
.boxscore__team-label{font-family:var(--font-display);font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--orange);margin:12px 0 6px}
.boxscore table{width:100%;border-collapse:collapse;font-family:var(--font-mono);font-size:12px}
.boxscore th{font-weight:700;color:var(--text-muted);text-align:center;padding:6px 4px;border-bottom:1px solid var(--surface-border);font-size:10px;letter-spacing:1px}
.boxscore th:first-child{text-align:left}
.boxscore td{text-align:center;padding:6px 4px;border-bottom:1px solid #1a1a1a}
.boxscore td:first-child{text-align:left;font-weight:600}
.boxscore__actions{display:flex;gap:10px;margin-top:20px;justify-content:center}

/* ═══ PLAY LOG ═══ */
.playlog{position:fixed;top:56px;right:0;width:260px;height:calc(100vh - 56px);background:var(--surface);border-left:1px solid var(--surface-border);z-index:50;transform:translateX(100%);transition:transform .25s ease;overflow-y:auto;padding:12px}
.playlog.open{transform:translateX(0)}
.playlog__title{font-family:var(--font-display);font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);margin-bottom:10px}
.playlog__entry{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);padding:4px 0;border-bottom:1px solid #1a1a1a}
.playlog__entry--undone{text-decoration:line-through;color:var(--text-dim)}
.playlog__entry span{color:var(--orange)}

/* ═══ RESPONSIVE ═══ */
@media(max-width:600px){
  .scorebar__score{font-size:36px}
  .scorebar__name{font-size:16px}
  .scorebar{height:64px}
  .court{height:calc(100vh - 56px - 64px)}
  .player__mini-stats{display:none}
}
</style>
</head>
<body>

<!-- Loading -->
<div id="loading">
  <div class="logo">ALLNET</div>
  <div class="sub">Loading scoreboard…</div>
  <div class="spinner"></div>
</div>

<!-- Header -->
<div class="header" id="header" style="display:none">
  <div class="header__left">
    <div class="header__game" id="hdrGame">Game 1</div>
    <div class="header__timer" id="hdrTimer">0:00</div>
  </div>
  <div class="header__right">
    <button class="btn btn--ghost btn--icon" id="btnPlayLog" title="Play log">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="12" height="12" rx="1"/><line x1="5" y1="5" x2="11" y2="5"/><line x1="5" y1="8" x2="11" y2="8"/><line x1="5" y1="11" x2="9" y2="11"/></svg>
      Log
    </button>
    <button class="btn btn--ghost btn--icon" id="btnUndo" title="Undo last">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1,4 1,10 7,10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
      Undo
    </button>
    <button class="btn btn--ghost btn--icon" id="btnSettings" title="Settings">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="8" cy="8" r="3"/><path d="M8 1v2m0 10v2m-5-7H1m14 0h-2m-1.5-4.5l1.4-1.4M3.1 12.9l1.4-1.4m0-7l-1.4-1.4m9.8 9.8l-1.4-1.4"/></svg>
    </button>
    <button class="btn btn--red btn--icon" id="btnEndGame">End game</button>
  </div>
</div>

<!-- Score Bar -->
<div class="scorebar" id="scorebar" style="display:none">
  <div class="scorebar__team scorebar__team--a">
    <div class="scorebar__name" id="teamAName">TEAM A</div>
    <div class="scorebar__score" id="teamAScore">0</div>
  </div>
  <div class="scorebar__divider"><div class="scorebar__vs">VS</div></div>
  <div class="scorebar__team scorebar__team--b">
    <div class="scorebar__score" id="teamBScore">0</div>
    <div class="scorebar__name" id="teamBName">TEAM B</div>
  </div>
</div>

<!-- Court -->
<div class="court" id="court" style="display:none">
  <div class="court__team court__team--a" id="teamAPanel"></div>
  <div class="court__team court__team--b" id="teamBPanel"></div>
</div>

<!-- Stat Palette -->
<div class="palette-overlay" id="paletteOverlay">
  <div class="palette" id="palette">
    <div class="palette__player" id="palPlayer"></div>
    <div class="palette__row" id="palPtsRow">
      <button class="palette__btn palette__btn--pts" data-pts="1">+1</button>
      <button class="palette__btn palette__btn--pts" data-pts="2">+2</button>
      <button class="palette__btn palette__btn--pts" data-pts="3">+3</button>
    </div>
    <div class="palette__row">
      <button class="palette__btn palette__btn--stat" data-stat="reb">REB</button>
      <button class="palette__btn palette__btn--stat" data-stat="ast">AST</button>
      <button class="palette__btn palette__btn--stat" data-stat="stl">STL</button>
      <button class="palette__btn palette__btn--stat" data-stat="blk">BLK</button>
      <button class="palette__btn palette__btn--stat" data-stat="to">TO</button>
    </div>
    <div class="palette__row">
      <button class="palette__btn palette__btn--cancel" id="palCancel">Cancel</button>
    </div>
  </div>
</div>

<!-- Assist Prompt Bar -->
<div class="assist-bar" id="assistBar">
  <div class="assist-bar__label">Assist by?</div>
  <div class="assist-bar__players" id="assistPlayers"></div>
</div>

<!-- Undo Toast -->
<div class="undo-toast" id="undoToast"></div>

<!-- Settings Overlay -->
<div class="settings-overlay" id="settingsOverlay">
  <div class="settings">
    <div class="settings__title">Scorekeeper Settings</div>
    <div class="settings__row">
      <div><div class="settings__label">Default points</div><div class="settings__desc">Auto-logged on player tap (one-tap mode) or PTS tap</div></div>
      <div class="settings__control" id="settDefaultPts">
        <button class="settings__option" data-val="1">+1</button>
        <button class="settings__option" data-val="2">+2</button>
        <button class="settings__option" data-val="3">+3</button>
      </div>
    </div>
    <div class="settings__row">
      <div><div class="settings__label">One-tap scoring</div><div class="settings__desc">Tap player = instant bucket. Long-press for stat palette.</div></div>
      <button class="toggle" id="settOneTap"></button>
    </div>
    <div class="settings__row">
      <div><div class="settings__label">Prompt assists</div><div class="settings__desc">After a bucket, ask who assisted</div></div>
      <button class="toggle" id="settAssists"></button>
    </div>
    <div class="settings__row">
      <div><div class="settings__label">Sound</div></div>
      <button class="toggle" id="settSound"></button>
    </div>
    <button class="btn btn--orange settings__close" id="settClose">Done</button>
  </div>
</div>

<!-- Box Score Modal -->
<div class="boxscore-overlay" id="boxscoreOverlay">
  <div class="boxscore" id="boxscore"></div>
</div>

<!-- Play Log Drawer -->
<div class="playlog" id="playlog">
  <div class="playlog__title">Play-by-Play</div>
  <div id="playlogEntries"></div>
</div>

<script>
// ═══════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════
const SB_URL = 'https://orrpowyewsioyxztwkdq.supabase.co';
const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9ycnBvd3lld3Npb3l4enR3a2RxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3ODAwNzMsImV4cCI6MjA4OTM1NjA3M30.4K6ZT-eNOGbvXxJkN_Dt7aLv80GlC0rrTLcIUPExwp0';

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let gameId = null;
let gameData = null;   // { game_number, team_a_name, team_b_name, team_a_score, team_b_score, jersey_assignments, ... }
let stats = {};        // { player_id: { points, rebounds, assists, steals, blocks, turnovers, fgm, three_pm, ftm, jersey_number, team, name } }
let events = [];       // chronological play log
let session = null;    // auth session
let timerInterval = null;
let startedAt = null;
let selectedPlayer = null;
let longPressTimer = null;

let settings = {
  default_points: 2,
  one_tap_scoring: false,
  prompt_assists: false,
  sound: true,
};

// Audio
const clickSound = new AudioContext();
function playClick() {
  if (!settings.sound) return;
  try {
    const o = clickSound.createOscillator();
    const g = clickSound.createGain();
    o.connect(g); g.connect(clickSound.destination);
    o.frequency.value = 800; g.gain.value = 0.1;
    o.start(); g.gain.exponentialRampToValueAtTime(0.001, clickSound.currentTime + 0.08);
    o.stop(clickSound.currentTime + 0.1);
  } catch(e) {}
}

// ═══════════════════════════════════════════════
// AUTH + INIT
// ═══════════════════════════════════════════════
async function sbFetch(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json', apikey: SB_ANON };
  if (session?.access_token) headers['Authorization'] = `Bearer ${session.access_token}`;
  else headers['Authorization'] = `Bearer ${SB_ANON}`;
  const res = await fetch(`${SB_URL}${path}`, { ...opts, headers: { ...headers, ...opts.headers } });
  return res.json();
}

async function rpc(fn, params = {}) {
  return sbFetch(`/rest/v1/rpc/${fn}`, { method: 'POST', body: JSON.stringify(params) });
}

async function init() {
  // Get game_id from URL
  const parts = window.location.pathname.split('/');
  gameId = parts[parts.length - 1];
  if (!gameId || gameId.length < 30) {
    document.getElementById('loading').innerHTML = '<div style="text-align:center;padding:40px"><div class="logo">ALLNET</div><p style="color:#888;margin-top:12px">Invalid scoreboard link.</p></div>';
    return;
  }

  // Check auth
  const stored = localStorage.getItem('sb-orrpowyewsioyxztwkdq-auth-token');
  if (stored) {
    try {
      const parsed = JSON.parse(stored);
      session = parsed;
      // Refresh if needed
      if (parsed.expires_at && parsed.expires_at * 1000 < Date.now()) {
        const refreshed = await fetch(`${SB_URL}/auth/v1/token?grant_type=refresh_token`, {
          method: 'POST', headers: { 'Content-Type': 'application/json', apikey: SB_ANON },
          body: JSON.stringify({ refresh_token: parsed.refresh_token })
        }).then(r => r.json());
        if (refreshed.access_token) {
          session = refreshed;
          localStorage.setItem('sb-orrpowyewsioyxztwkdq-auth-token', JSON.stringify(refreshed));
        }
      }
    } catch(e) { session = null; }
  }

  if (!session?.access_token) {
    document.getElementById('loading').innerHTML = '<div style="text-align:center;padding:40px"><div class="logo">ALLNET</div><p style="color:#888;margin-top:12px">Sign in to AllNet to use the scoreboard.</p><p style="color:#555;margin-top:8px;font-size:13px">Open this link in a browser where you\'re logged in.</p></div>';
    return;
  }

  // Load game data
  await loadGame();
}

async function loadGame() {
  // Fetch game + stats + events
  const [gameRes, statsRes, eventsRes] = await Promise.all([
    sbFetch(`/rest/v1/run_games?id=eq.${gameId}&select=*`),
    sbFetch(`/rest/v1/run_game_stats?game_id=eq.${gameId}&select=*`),
    sbFetch(`/rest/v1/run_game_events?game_id=eq.${gameId}&undone=eq.false&order=sequence.asc&select=*`),
  ]);

  if (!gameRes?.[0]) {
    document.getElementById('loading').innerHTML = '<div style="text-align:center;padding:40px"><div class="logo">ALLNET</div><p style="color:#888;margin-top:12px">Game not found.</p></div>';
    return;
  }

  gameData = gameRes[0];
  events = Array.isArray(eventsRes) ? eventsRes : [];

  // Load player names
  const allIds = [...(gameData.team_a_player_ids || []), ...(gameData.team_b_player_ids || [])];
  const profilesRes = await sbFetch(`/rest/v1/profiles?id=in.(${allIds.join(',')})&select=id,first_name,last_name`);
  const nameMap = {};
  (Array.isArray(profilesRes) ? profilesRes : []).forEach(p => { nameMap[p.id] = p.first_name + (p.last_name ? ' ' + p.last_name[0] + '.' : ''); });

  // Build stats map
  stats = {};
  (Array.isArray(statsRes) ? statsRes : []).forEach(s => {
    stats[s.player_id] = {
      ...s,
      name: nameMap[s.player_id] || 'Unknown',
    };
  });

  // Load org settings
  try {
    const sessionRes = await sbFetch(`/rest/v1/run_sessions?id=eq.${gameData.session_id}&select=org_id`);
    if (sessionRes?.[0]) {
      const orgRes = await sbFetch(`/rest/v1/organizations?id=eq.${sessionRes[0].org_id}&select=scorekeeper_settings`);
      if (orgRes?.[0]?.scorekeeper_settings) {
        settings = { ...settings, ...orgRes[0].scorekeeper_settings };
      }
    }
  } catch(e) {}

  startedAt = gameData.started_at ? new Date(gameData.started_at) : new Date();
  render();
  startTimer();

  document.getElementById('loading').style.display = 'none';
  document.getElementById('header').style.display = 'flex';
  document.getElementById('scorebar').style.display = 'flex';
  document.getElementById('court').style.display = 'flex';
}

// ═══════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════
function render() {
  const gd = gameData;
  document.getElementById('hdrGame').textContent = `Game ${gd.game_number}`;
  document.getElementById('teamAName').textContent = gd.team_a_name;
  document.getElementById('teamBName').textContent = gd.team_b_name;
  updateScores();
  renderTeam('teamAPanel', gd.team_a_player_ids, 'team_a', gd.team_a_name);
  renderTeam('teamBPanel', gd.team_b_player_ids, 'team_b', gd.team_b_name);
}

function updateScores() {
  const a = gameData.team_a_score, b = gameData.team_b_score;
  const elA = document.getElementById('teamAScore');
  const elB = document.getElementById('teamBScore');
  elA.textContent = a; elB.textContent = b;
  elA.className = 'scorebar__score' + (a > b ? ' scorebar__score--lead' : '');
  elB.className = 'scorebar__score' + (b > a ? ' scorebar__score--lead' : '');
}

function renderTeam(panelId, playerIds, team, teamName) {
  const panel = document.getElementById(panelId);
  let html = `<div class="court__team-label">${esc(teamName)}</div>`;
  (playerIds || []).forEach(pid => {
    const s = stats[pid] || {};
    const j = s.jersey_number || 0;
    const miniStats = [];
    if (s.rebounds) miniStats.push(`${s.rebounds}r`);
    if (s.assists) miniStats.push(`${s.assists}a`);
    if (s.steals) miniStats.push(`${s.steals}s`);
    if (s.blocks) miniStats.push(`${s.blocks}b`);
    if (s.turnovers) miniStats.push(`${s.turnovers}t`);
    html += `<div class="player" data-pid="${pid}" data-team="${team}">
      <div class="player__jersey">#${j}</div>
      <div class="player__name">${esc(s.name || 'Player')}</div>
      ${miniStats.length ? `<div class="player__mini-stats">${miniStats.map(ms => `<span class="player__mini-stat">${ms}</span>`).join('')}</div>` : ''}
      <div class="player__pts">${s.points || 0}</div>
    </div>`;
  });
  panel.innerHTML = html;

  // Bind taps
  panel.querySelectorAll('.player').forEach(el => {
    const pid = el.dataset.pid;
    const team = el.dataset.team;
    if (settings.one_tap_scoring) {
      // Short tap = default points, long press = palette
      el.addEventListener('pointerdown', () => {
        longPressTimer = setTimeout(() => { longPressTimer = null; openPalette(pid, team); }, 400);
      });
      el.addEventListener('pointerup', () => {
        if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; logEvent(pid, 'pts', settings.default_points); }
      });
      el.addEventListener('pointerleave', () => { if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; } });
    } else {
      el.addEventListener('click', () => openPalette(pid, team));
    }
  });
}

// ═══════════════════════════════════════════════
// STAT PALETTE
// ═══════════════════════════════════════════════
function openPalette(pid, team) {
  selectedPlayer = { pid, team };
  const s = stats[pid] || {};
  document.getElementById('palPlayer').innerHTML = `<span>#${s.jersey_number || 0}</span> ${esc(s.name || 'Player')}`;
  document.getElementById('paletteOverlay').classList.add('active');
}

function closePalette() {
  document.getElementById('paletteOverlay').classList.remove('active');
  selectedPlayer = null;
}

// Point buttons
document.querySelectorAll('[data-pts]').forEach(btn => {
  btn.addEventListener('click', () => {
    if (!selectedPlayer) return;
    const pv = parseInt(btn.dataset.pts);
    logEvent(selectedPlayer.pid, 'pts', pv);
    closePalette();
  });
});

// Stat buttons
document.querySelectorAll('[data-stat]').forEach(btn => {
  btn.addEventListener('click', () => {
    if (!selectedPlayer) return;
    logEvent(selectedPlayer.pid, btn.dataset.stat, null);
    closePalette();
  });
});

document.getElementById('palCancel').addEventListener('click', closePalette);
document.getElementById('paletteOverlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('paletteOverlay')) closePalette();
});

// ═══════════════════════════════════════════════
// LOG EVENT
// ═══════════════════════════════════════════════
async function logEvent(pid, statType, pointValue) {
  playClick();

  // Optimistic update
  const s = stats[pid];
  if (!s) return;

  if (statType === 'pts' && pointValue) {
    s.points = (s.points || 0) + pointValue;
    if (pointValue === 1) s.ftm = (s.ftm || 0) + 1;
    if (pointValue >= 2) s.fgm = (s.fgm || 0) + 1;
    if (pointValue === 3) s.three_pm = (s.three_pm || 0) + 1;
    if (s.team === 'team_a') gameData.team_a_score += pointValue;
    else gameData.team_b_score += pointValue;
  } else {
    const col = { reb: 'rebounds', ast: 'assists', stl: 'steals', blk: 'blocks', to: 'turnovers' }[statType];
    if (col) s[col] = (s[col] || 0) + 1;
  }

  // Re-render affected parts
  updateScores();
  renderTeam(s.team === 'team_a' ? 'teamAPanel' : 'teamBPanel',
    s.team === 'team_a' ? gameData.team_a_player_ids : gameData.team_b_player_ids,
    s.team, s.team === 'team_a' ? gameData.team_a_name : gameData.team_b_name);

  // Add to local event log
  events.push({ player_id: pid, stat_type: statType, point_value: pointValue, jersey_number: s.jersey_number, team: s.team, name: s.name });

  // Show assist prompt if applicable
  if (settings.prompt_assists && statType === 'pts' && pointValue >= 2) {
    showAssistPrompt(pid, s.team);
  }

  // Persist to DB
  const params = { p_game_id: gameId, p_player_id: pid, p_stat_type: statType };
  if (pointValue) params.p_point_value = pointValue;
  const res = await rpc('log_game_event', params);
  if (res?.error) {
    showToast('Error: ' + (typeof res.error === 'string' ? res.error : JSON.stringify(res.error)));
  }
}

// ═══════════════════════════════════════════════
// ASSIST PROMPT
// ═══════════════════════════════════════════════
function showAssistPrompt(scorerPid, team) {
  const bar = document.getElementById('assistBar');
  const container = document.getElementById('assistPlayers');
  const teammates = (team === 'team_a' ? gameData.team_a_player_ids : gameData.team_b_player_ids)
    .filter(id => id !== scorerPid);

  let html = '';
  teammates.forEach(pid => {
    const s = stats[pid] || {};
    html += `<button class="assist-bar__player" data-pid="${pid}">#${s.jersey_number || 0} ${esc((s.name || '').split(' ')[0])}</button>`;
  });
  html += `<button class="assist-bar__skip" id="assistSkip">Skip</button>`;
  container.innerHTML = html;

  bar.classList.add('active');

  container.querySelectorAll('.assist-bar__player').forEach(btn => {
    btn.addEventListener('click', () => {
      logEvent(btn.dataset.pid, 'ast', null);
      bar.classList.remove('active');
    }, { once: true });
  });
  document.getElementById('assistSkip')?.addEventListener('click', () => {
    bar.classList.remove('active');
  }, { once: true });

  // Auto-dismiss after 4 seconds
  setTimeout(() => bar.classList.remove('active'), 4000);
}

// ═══════════════════════════════════════════════
// UNDO
// ═══════════════════════════════════════════════
document.getElementById('btnUndo').addEventListener('click', async () => {
  const res = await rpc('undo_game_event', { p_game_id: gameId });
  if (res?.error) { showToast(typeof res.error === 'string' ? res.error : 'Nothing to undo'); return; }
  if (res?.success === false && res?.error) { showToast(res.error); return; }

  playClick();

  // Update local state from response
  if (res.team_a_score !== undefined) gameData.team_a_score = res.team_a_score;
  if (res.team_b_score !== undefined) gameData.team_b_score = res.team_b_score;

  // Rebuild stats from DB (simplest approach for undo consistency)
  const statsRes = await sbFetch(`/rest/v1/run_game_stats?game_id=eq.${gameId}&select=*`);
  (Array.isArray(statsRes) ? statsRes : []).forEach(s => {
    if (stats[s.player_id]) Object.assign(stats[s.player_id], s);
  });

  updateScores();
  renderTeam('teamAPanel', gameData.team_a_player_ids, 'team_a', gameData.team_a_name);
  renderTeam('teamBPanel', gameData.team_b_player_ids, 'team_b', gameData.team_b_name);

  showToast(`Undone: ${res.undone_stat || 'event'}`);
});

// ═══════════════════════════════════════════════
// END GAME
// ═══════════════════════════════════════════════
document.getElementById('btnEndGame').addEventListener('click', showBoxScore);

function showBoxScore() {
  const gd = gameData;
  const winner = gd.team_a_score > gd.team_b_score ? gd.team_a_name :
                 gd.team_b_score > gd.team_a_score ? gd.team_b_name : 'Tie';

  let html = `<div class="boxscore__title">Final Score</div>`;
  html += `<div class="boxscore__score">${esc(gd.team_a_name)} <span>${gd.team_a_score}</span> – <span>${gd.team_b_score}</span> ${esc(gd.team_b_name)}</div>`;

  html += buildStatsTable(gd.team_a_name, gd.team_a_player_ids);
  html += buildStatsTable(gd.team_b_name, gd.team_b_player_ids);

  html += `<div class="boxscore__actions">
    <button class="btn btn--ghost" onclick="document.getElementById('boxscoreOverlay').classList.remove('active')">Continue playing</button>
    <button class="btn btn--orange" id="btnFinalize">Confirm & end game</button>
  </div>`;

  document.getElementById('boxscore').innerHTML = html;
  document.getElementById('boxscoreOverlay').classList.add('active');

  document.getElementById('btnFinalize').addEventListener('click', finalizeGame);
}

function buildStatsTable(teamName, playerIds) {
  let html = `<div class="boxscore__team-label">${esc(teamName)}</div>`;
  html += `<table><thead><tr><th>Player</th><th>PTS</th><th>REB</th><th>AST</th><th>STL</th><th>BLK</th><th>TO</th><th>FGM</th><th>3PM</th><th>FTM</th></tr></thead><tbody>`;
  (playerIds || []).forEach(pid => {
    const s = stats[pid] || {};
    html += `<tr>
      <td>#${s.jersey_number || 0} ${esc((s.name || '').split(' ')[0])}</td>
      <td>${s.points || 0}</td><td>${s.rebounds || 0}</td><td>${s.assists || 0}</td>
      <td>${s.steals || 0}</td><td>${s.blocks || 0}</td><td>${s.turnovers || 0}</td>
      <td>${s.fgm || 0}</td><td>${s.three_pm || 0}</td><td>${s.ftm || 0}</td>
    </tr>`;
  });
  html += '</tbody></table>';
  return html;
}

async function finalizeGame() {
  const res = await rpc('finalize_scored_game', { p_game_id: gameId });
  if (res?.error) { alert(res.error); return; }
  // Show final state
  document.getElementById('boxscore').innerHTML = `
    <div class="boxscore__title" style="color:var(--green)">Game Complete</div>
    <div class="boxscore__score">${esc(gameData.team_a_name)} <span>${gameData.team_a_score}</span> – <span>${gameData.team_b_score}</span> ${esc(gameData.team_b_name)}</div>
    <p style="text-align:center;color:var(--text-muted);font-size:14px;margin:16px 0">Winner: <strong style="color:var(--orange)">${res.winner === 'team_a' ? gameData.team_a_name : res.winner === 'team_b' ? gameData.team_b_name : 'Draw'}</strong></p>
    <p style="text-align:center;color:var(--text-dim);font-size:12px">Ratings updated. You can close this tab.</p>
  `;
  clearInterval(timerInterval);
}

// ═══════════════════════════════════════════════
// SETTINGS
// ═══════════════════════════════════════════════
document.getElementById('btnSettings').addEventListener('click', () => {
  renderSettings();
  document.getElementById('settingsOverlay').classList.add('active');
});
document.getElementById('settClose').addEventListener('click', () => {
  document.getElementById('settingsOverlay').classList.remove('active');
  // Re-render court with new settings (one-tap mode may have changed)
  renderTeam('teamAPanel', gameData.team_a_player_ids, 'team_a', gameData.team_a_name);
  renderTeam('teamBPanel', gameData.team_b_player_ids, 'team_b', gameData.team_b_name);
  // Save to org (fire-and-forget)
  saveSettings();
});

function renderSettings() {
  // Default points
  document.querySelectorAll('#settDefaultPts .settings__option').forEach(btn => {
    btn.classList.toggle('settings__option--active', parseInt(btn.dataset.val) === settings.default_points);
    btn.onclick = () => { settings.default_points = parseInt(btn.dataset.val); renderSettings(); };
  });
  // Toggles
  setToggle('settOneTap', settings.one_tap_scoring, v => settings.one_tap_scoring = v);
  setToggle('settAssists', settings.prompt_assists, v => settings.prompt_assists = v);
  setToggle('settSound', settings.sound, v => settings.sound = v);
}

function setToggle(id, value, onChange) {
  const el = document.getElementById(id);
  el.className = 'toggle' + (value ? ' on' : '');
  el.onclick = () => { onChange(!value); renderSettings(); };
}

async function saveSettings() {
  try {
    const sessionRes = await sbFetch(`/rest/v1/run_sessions?id=eq.${gameData.session_id}&select=org_id`);
    if (sessionRes?.[0]) {
      await fetch(`${SB_URL}/rest/v1/organizations?id=eq.${sessionRes[0].org_id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', apikey: SB_ANON, Authorization: `Bearer ${session.access_token}`, Prefer: 'return=minimal' },
        body: JSON.stringify({ scorekeeper_settings: settings })
      });
    }
  } catch(e) {}
}

// ═══════════════════════════════════════════════
// PLAY LOG
// ═══════════════════════════════════════════════
document.getElementById('btnPlayLog').addEventListener('click', () => {
  const log = document.getElementById('playlog');
  log.classList.toggle('open');
  renderPlayLog();
});

function renderPlayLog() {
  const container = document.getElementById('playlogEntries');
  let html = '';
  events.slice().reverse().forEach(e => {
    const label = e.stat_type === 'pts' ? `+${e.point_value}pt` : e.stat_type.toUpperCase();
    html += `<div class="playlog__entry"><span>#${e.jersey_number}</span> ${esc((e.name || '').split(' ')[0])} — ${label}</div>`;
  });
  container.innerHTML = html || '<div style="color:#555;font-size:12px">No plays yet</div>';
}

// ═══════════════════════════════════════════════
// TIMER
// ═══════════════════════════════════════════════
function startTimer() {
  timerInterval = setInterval(() => {
    const diff = Math.floor((Date.now() - startedAt.getTime()) / 1000);
    const m = Math.floor(diff / 60);
    const s = diff % 60;
    document.getElementById('hdrTimer').textContent = `${m}:${s.toString().padStart(2, '0')}`;
  }, 1000);
}

// ═══════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════
function showToast(msg) {
  const t = document.getElementById('undoToast');
  t.textContent = msg;
  t.classList.add('visible');
  setTimeout(() => t.classList.remove('visible'), 2000);
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ═══════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════
init();
</script>

</html>
