<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AllNet — Activity</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Oswald:wght@400;500;600;700&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/app.css">
<style>
html, body { height: auto; overflow: auto; }

.activity-page {
  min-height: 100vh;
  background: var(--bg);
  padding-bottom: 40px;
}

.activity-topbar {
  position: sticky; top: 0; z-index: 100;
  padding: 14px 16px;
  background: rgba(10,10,10,0.95);
  backdrop-filter: blur(16px);
  display: flex; align-items: center; gap: 12px;
  border-bottom: 1px solid var(--border);
}

.activity-topbar__title {
  flex: 1; font-family: var(--font-display); font-size: 18px;
  font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
}

/* Filter tabs */
.feed-filters {
  display: flex; gap: 0; padding: 0 16px;
  border-bottom: 1px solid var(--border);
}

.feed-filter {
  flex: 1; padding: 12px 8px; text-align: center;
  font-family: var(--font-display); font-size: 12px; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--text-muted); cursor: pointer; border: none; background: none;
  border-bottom: 2px solid transparent; transition: var(--transition);
}

.feed-filter:hover { color: var(--text-secondary); }

.feed-filter.active {
  color: var(--orange); border-bottom-color: var(--orange);
}

.feed-filter--disabled {
  opacity: 0.35; cursor: not-allowed;
}

/* Match cards */
.feed-list {
  padding: 16px;
  display: flex; flex-direction: column; gap: 12px;
}

.match-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: var(--transition);
}

.match-card__header {
  padding: 14px 16px 10px;
  display: flex; align-items: center; justify-content: space-between;
}

.match-card__format {
  font-family: var(--font-display); font-size: 13px; font-weight: 700;
  letter-spacing: 0.06em; text-transform: uppercase;
  padding: 3px 10px; border-radius: 100px;
  background: rgba(255,90,31,0.1); color: var(--orange);
  border: 1px solid rgba(255,90,31,0.2);
}

.match-card__meta {
  font-size: 11px; color: var(--text-muted); font-family: var(--font-mono);
  display: flex; align-items: center; gap: 6px;
}

.match-card__court {
  padding: 0 16px 12px;
  font-size: 13px; color: var(--text-secondary);
  display: flex; align-items: center; gap: 6px;
}

.match-card__court-icon { opacity: 0.6; }

/* Teams display */
.match-card__teams {
  padding: 0 16px 16px;
  display: flex; flex-direction: column; gap: 8px;
}

.match-card__team {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
}

.match-card__team--winner {
  background: rgba(34,197,94,0.06);
  border: 1px solid rgba(34,197,94,0.15);
}

.match-card__team--loser {
  background: rgba(255,255,255,0.02);
  border: 1px solid var(--border);
}

.match-card__team-result {
  font-family: var(--font-display); font-size: 13px; font-weight: 700;
  width: 24px; height: 24px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; color: white;
}

.match-card__team-result--w { background: var(--green-live); }
.match-card__team-result--l { background: rgba(107,107,107,0.4); }

.match-card__team-players {
  flex: 1; display: flex; flex-wrap: wrap; gap: 6px;
}

.match-card__player {
  display: flex; align-items: center; gap: 6px;
}

.match-card__player-avatar {
  width: 28px; height: 28px; border-radius: 50%;
  background: linear-gradient(135deg, var(--orange), #FF8C42);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display); font-size: 10px; font-weight: 700;
  color: white; flex-shrink: 0; overflow: hidden;
  position: relative;
}

.match-card__player-avatar .av-comp {
  position: absolute; inset: 0; border-radius: 50%; overflow: hidden;
}

.match-card__player-avatar .av-comp__cover {
  position: absolute; inset: 0;
  background-size: cover; background-position: center;
}

.match-card__player-avatar .av-comp__cutout {
  position: absolute; inset: -10%; width: 120%; height: 120%;
  object-fit: contain; object-position: center top;
  z-index: 1;
}

.match-card__team--loser .match-card__player-avatar {
  background: linear-gradient(135deg, #555, #777);
}

.match-card__player-name {
  font-size: 13px; font-weight: 600;
}

.match-card__team--loser .match-card__player-name {
  color: var(--text-muted);
}

/* Spray row on match cards */
.match-card__sprays {
  padding: 0 16px 12px;
  display: flex; align-items: center; gap: 8px;
}

.spray-btn {
  background: none; border: 1px solid var(--border-light);
  border-radius: 100px; padding: 4px 12px;
  font-size: 11px; color: var(--text-muted); cursor: pointer;
  font-family: var(--font-body); transition: var(--transition);
  display: flex; align-items: center; gap: 4px;
}

.spray-btn:hover { border-color: var(--text-secondary); color: var(--text-secondary); }
.spray-btn.has-sprays { border-color: var(--orange); color: var(--orange); }

/* ═══ Post Detail Overlay ═══ */
.post-detail-overlay {
  position: fixed; inset: 0; z-index: 1000;
  background: #000; overflow-y: auto;
  transform: translateX(100%);
  transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

.post-detail-overlay.open { transform: translateX(0); }

.post-detail__header {
  position: sticky; top: 0; z-index: 10;
  padding: 16px; text-align: center;
  background: #000; border-bottom: 1px solid #2e2e2e;
}

.post-detail__title {
  font-family: 'Montserrat', sans-serif; font-size: 16px;
  font-weight: 600; color: #fff;
}

.post-detail__match {
  padding: 16px; background: #000;
}

.post-detail__sprays-section {
  background: #181818; min-height: 300px;
  padding: 0 16px 120px;
}

.post-detail__spray-row {
  display: flex; align-items: center; gap: 8px;
  padding: 14px 0;
  border-bottom: 1px solid #2e2e2e;
}

.post-detail__spray-avatar {
  width: 40px; height: 40px; border-radius: 50%;
  background: linear-gradient(135deg, var(--orange), #FF8C42);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display); font-size: 14px; font-weight: 700;
  color: white; flex-shrink: 0; overflow: hidden;
  position: relative;
}

.post-detail__spray-avatar .av-comp {
  position: absolute; inset: 0; border-radius: 50%; overflow: hidden;
}

.post-detail__spray-avatar .av-comp__cover {
  position: absolute; inset: 0;
  background-size: cover; background-position: center;
}

.post-detail__spray-avatar .av-comp__cutout {
  position: absolute; inset: -10%; width: 120%; height: 120%;
  object-fit: contain; object-position: center top; z-index: 1;
}

.post-detail__spray-info {
  flex: 1; display: flex; flex-direction: column; gap: 2px;
}

.post-detail__spray-name {
  font-family: 'Montserrat', sans-serif; font-size: 16px;
  font-weight: 600; color: #fff;
}

.post-detail__spray-time {
  font-family: 'Montserrat', sans-serif; font-size: 10px;
  font-weight: 500; color: #c1c1c1;
}

.post-detail__spray-img {
  width: 104px; height: 104px; object-fit: contain;
  flex-shrink: 0;
}

.post-detail__empty {
  text-align: center; padding: 60px 20px; color: #666;
  font-size: 14px;
}

/* Bottom nav bar — post detail & spray picker */
.overlay-bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  z-index: 1010; padding: 16px;
  display: flex; align-items: center; justify-content: center; gap: 12px;
  background: linear-gradient(transparent, #000 30%);
  padding-bottom: env(safe-area-inset-bottom, 16px);
}

.overlay-nav-btn {
  width: 48px; height: 48px; border-radius: 50%;
  background: #000; border: 1px solid #222;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: var(--transition); overflow: hidden;
}

.overlay-nav-btn:hover { border-color: #444; }

.overlay-nav-btn svg {
  width: 24px; height: 24px; stroke: #fff;
  stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round;
}

.overlay-nav-btn--spray svg {
  width: 28px; height: 28px;
  stroke: none; stroke-width: 0; fill: none;
}

.overlay-nav-btn--disabled {
  opacity: 0.35; cursor: not-allowed;
}

/* ═══ Spray Picker Overlay ═══ */
.spray-picker-overlay {
  position: fixed; inset: 0; z-index: 1100;
  background: #000; overflow-y: auto;
  transform: translateX(100%);
  transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

.spray-picker-overlay.open { transform: translateX(0); }

.spray-picker__header {
  position: sticky; top: 0; z-index: 10;
  padding: 16px; text-align: center;
  background: #000; border-bottom: 1px solid #2e2e2e;
}

.spray-picker__title {
  font-family: 'Montserrat', sans-serif; font-size: 16px;
  font-weight: 600; color: #fff;
}

.spray-picker__grid {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 0; padding: 16px;
}

.spray-picker__tile {
  background: #000; border: 1px solid #2e2e2e;
  overflow: hidden; cursor: pointer; height: 146px;
  display: flex; align-items: center; justify-content: center;
  transition: border 0.15s ease;
}

.spray-picker__tile.selected {
  border: 4px solid #fff;
}

.spray-picker__tile img {
  width: 100%; height: 100%; object-fit: contain;
}

/* ── Media Carousel ── */
.match-card__media {
  position: relative;
  width: 100%;
  background: #000;
  overflow: hidden;
}

.match-card__media-track {
  display: flex;
  transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

.match-card__media-slide {
  min-width: 100%;
  position: relative;
}

.match-card__media-slide img {
  width: 100%;
  max-height: 500px;
  object-fit: contain;
  background: #000;
  display: block;
}

.match-card__media-slide video {
  width: 100%;
  max-height: 500px;
  object-fit: contain;
  background: #000;
  display: block;
}

.match-card__video-wrap {
  position: relative;
  width: 100%;
  background: #000;
}

.match-card__video-wrap video {
  width: 100%;
  max-height: 500px;
  object-fit: contain;
  display: block;
}

.match-card__video-mute {
  position: absolute;
  bottom: 12px;
  right: 12px;
  width: 32px; height: 32px;
  border-radius: 50%;
  background: rgba(0,0,0,0.6);
  border: none;
  color: white;
  font-size: 14px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  z-index: 3;
  backdrop-filter: blur(4px);
  transition: background 0.2s;
}

.match-card__video-mute:hover { background: rgba(0,0,0,0.8); }

.match-card__video-pause {
  position: absolute;
  inset: 0;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  z-index: 2;
}

.match-card__video-pause-icon {
  width: 52px; height: 52px;
  border-radius: 50%;
  background: rgba(0,0,0,0.5);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  color: white;
  opacity: 0;
  transition: opacity 0.2s;
  backdrop-filter: blur(4px);
}

.match-card__video-pause.paused .match-card__video-pause-icon {
  opacity: 1;
}

.match-card__media-caption {
  padding: 10px 16px;
  background: var(--bg-card);
}

.match-card__media-author {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 4px;
}

.match-card__media-author-avatar {
  width: 18px; height: 18px; border-radius: 50%;
  overflow: hidden; flex-shrink: 0;
  background: var(--border); display: flex; align-items: center; justify-content: center;
  font-size: 8px; font-weight: 700; color: #fff;
}

.match-card__media-author-avatar img {
  width: 100%; height: 100%; object-fit: cover;
}

.match-card__media-text {
  font-size: 14px;
  color: var(--text-primary);
  line-height: 1.5;
}

.match-card__media-dots {
  display: flex;
  justify-content: center;
  gap: 6px;
  padding: 8px 0;
  background: var(--bg-card);
}

.match-card__media-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--border-light);
  transition: background 0.2s;
}

.match-card__media-dot--active {
  background: var(--orange);
}

.match-card__media-nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 32px; height: 32px;
  border-radius: 50%;
  background: rgba(0,0,0,0.6);
  border: none;
  color: white;
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  z-index: 10;
  backdrop-filter: blur(4px);
}

.match-card__media-nav--prev { left: 8px; }
.match-card__media-nav--next { right: 8px; }

/* Empty state */
.feed-empty {
  text-align: center; padding: 80px 20px; color: var(--text-muted);
}

.feed-empty__icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }

.feed-empty__title {
  font-family: var(--font-display); font-size: 20px; font-weight: 700;
  text-transform: uppercase; color: var(--text-secondary); margin-bottom: 8px;
}

.feed-empty__desc { font-size: 14px; line-height: 1.6; max-width: 280px; margin: 0 auto; }

.feed-loading {
  text-align: center; padding: 60px 20px; color: var(--text-muted); font-size: 14px;
}
</style>
</head>
<body>

<div class="activity-page" id="activityPage">
  <!-- Nav Drawer -->
  <div class="nav-drawer-overlay" id="navOverlay" onclick="closeNavDrawer()"></div>
  <div class="nav-drawer" id="navDrawer">
    <div class="nav-drawer__header">
      <svg height="20" viewBox="0 0 685 318" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M546.941 97.7H653.081V121.712H613.757V219.5H586.439V121.712H546.941V97.7Z" fill="white"/><path d="M538.737 121.712H482.883V146.594H516.813V170.606H482.883V195.488H538.737V219.5H455.565V97.7H538.737V121.712Z" fill="white"/><path d="M407.304 97.7H434.622V219.5H407.304V185.744L362.238 144.854V219.5H334.92V97.7H362.238V108.314L407.304 149.03V97.7Z" fill="white"/><path d="M267.07 195.488H322.924V219.5H255.064L239.752 204.188V97.7H267.07V195.488Z" fill="white"/><path d="M172.423 195.488H228.277V219.5H160.417L145.105 204.188V97.7H172.423V195.488Z" fill="white"/><path d="M109.74 97.7L125.052 113.012V219.5H97.734V194.792H58.236V291.5L30.918 307.5V113.012L46.23 97.7H109.74ZM58.236 170.606H97.734V121.712H58.236V170.606Z" fill="white"/><path d="M626 26.5L653 10.5V98.5H626V26.5Z" fill="white"/></svg>

    <nav class="nav-drawer__links">
      <a href="allnet-app.html" class="nav-drawer__link" data-nav="play">
        <span class="nav-drawer__link-icon">🏀</span>

      </a>
      <a href="allnet-activity.html" class="nav-drawer__link nav-drawer__link--active" data-nav="activity">

      <a href="allnet-career.html" class="nav-drawer__link" data-nav="career">

        <span class="nav-drawer__link-icon">⭐</span>
        <span class="nav-drawer__link-label">Stars</span>
      </a>
      <a href="allnet-settings.html" class="nav-drawer__link" data-nav="settings">

      <div class="nav-drawer__user" id="navUser" style="display:none;">
        <div class="nav-drawer__user-avatar" id="navAvatar">U</div>
        <div class="nav-drawer__user-info">
          <div class="nav-drawer__user-name" id="navUserName">Player</div>
          <div class="nav-drawer__user-stars" id="navUserStars">⭐ 0</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Top Bar -->
  <div class="activity-topbar">
    <button class="top-bar__menu" onclick="openNavDrawer()" aria-label="Menu">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><rect y="3" width="20" height="2" rx="1" fill="white"/><rect y="9" width="20" height="2" rx="1" fill="white"/><rect y="15" width="20" height="2" rx="1" fill="white"/></svg>
    </button>
    <div class="activity-topbar__title">Activity</div>

  <!-- Filter Tabs -->
  <div class="feed-filters">
    <button class="feed-filter active" data-filter="all" onclick="setFeedFilter('all', this)">All Games</button>

    <button class="feed-filter feed-filter--disabled" onclick="return false">Nearby</button>

  <!-- Feed -->
  <div class="feed-list" id="feedList">
    <div class="feed-loading">Loading games...</div>

</div>

<!-- Post Detail Overlay -->
<div class="post-detail-overlay" id="postDetailOverlay">
  <div class="post-detail__header">
    <div class="post-detail__title">Post graffitis</div>
  </div>
  <div class="post-detail__match" id="postDetailMatch"></div>
  <div class="post-detail__sprays-section" id="postDetailSprays"></div>
  <div class="overlay-bottom-nav">

<!-- Spray Picker Overlay -->
<div class="spray-picker-overlay" id="sprayPickerOverlay">
  <div class="spray-picker__header">
    <div class="spray-picker__title">Select a spray</div>
  </div>
  <div class="spray-picker__grid" id="sprayPickerGrid"></div>
  <div class="overlay-bottom-nav">
    <button class="overlay-nav-btn" onclick="closeSprayPicker()" aria-label="Back">
      <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </button>
    <button class="overlay-nav-btn" id="sprayConfirmBtn" onclick="confirmSpray()" aria-label="Confirm" style="opacity:0.35;cursor:not-allowed;">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>

</div>

<script src="js/supabase-helpers.js"></script>
<script>
/* ══════════════════════════════
   ACTIVITY FEED — AllNet
   Live-fetches profile data so avatars
   always show current cutout + cover
   ══════════════════════════════ */
let currentUser = null;
let currentProfile = null;
let liveProfiles = {}; // userId -> profile (fetched fresh)
let feedData = []; // cache of match_feed rows
let spraysByMatch = {}; // matchId -> [{ user_id, spray_item_id, created_at }]
let sprayItems = {}; // itemId -> store_item
let userInventory = new Set(); // item_ids the user owns
let activeMatchId = null; // currently viewing post detail
let selectedSprayId = null; // currently selected in spray picker
let userSprayedMatches = new Set(); // match_ids the current user has sprayed

// ── Covers Catalog ──
const SUPABASE_COVERS_URL = 'https://orrpowyewsioyxztwkdq.supabase.co/storage/v1/object/public/covers';
const COVERS = {
  crossover:  SUPABASE_COVERS_URL + '/Crossover.png',
  rally:      SUPABASE_COVERS_URL + '/Rally.png',
  flowstate:  SUPABASE_COVERS_URL + '/Flowstate.png',
  fastbreak:  SUPABASE_COVERS_URL + '/Fastbreak.png',
  shatter:    SUPABASE_COVERS_URL + '/Shatter.png',
  showtime:   SUPABASE_COVERS_URL + '/Showtime.png',
  fadeaway:   SUPABASE_COVERS_URL + '/Fadeaway.png'
};

// ── Nav Drawer ──
function openNavDrawer() {
  document.getElementById('navOverlay').classList.add('open');
  document.getElementById('navDrawer').classList.add('open');
}

function closeNavDrawer() {
  document.getElementById('navOverlay').classList.remove('open');

  el.classList.add('active');
}

// ── Time Ago ──
function timeAgo(date) {
  const s = Math.floor((Date.now() - date.getTime()) / 1000);
  if (s < 60) return 'Just now';
  if (s < 3600) return Math.floor(s / 60) + 'm ago';
  if (s < 86400) return Math.floor(s / 3600) + 'h ago';
  if (s < 604800) return Math.floor(s / 86400) + 'd ago';
  return date.toLocaleDateString();
}

/* ══════════════════════════════
   COMPOSITE AVATAR BUILDER
   Used for any player avatar in the UI.
   If the player has a cutout + cover, renders
   the mini composite. Otherwise falls back to
   raw photo or initials.
   ══════════════════════════════ */
function buildAvatarHtml(player) {
  const cutout = player.avatar_cutout_url;
  const cover = player.selected_cover || 'crossover';
  const coverUrl = COVERS[cover] || COVERS.crossover;
  const rawUrl = player.avatar_url;
  const initials = player.initials || (player.name || '??').split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);

  if (cutout) {
    return `<div class="av-comp">
      <div class="av-comp__cover" style="background-image:url('${coverUrl}')"></div>
      <img class="av-comp__cutout" src="${cutout}" alt="" onerror="this.style.display='none'">
    </div>`;
  }
  if (rawUrl) {
    return `<img src="${rawUrl}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" alt="">`;
  }
  return initials;
}

// ── Render Player (uses live profile data if available) ──
function renderPlayer(player) {
  // If this player has a user_id, use live profile data
  const live = player.user_id ? liveProfiles[player.user_id] : null;
  const avatarSource = live || player;
  const displayName = live ? (live.first_name && live.last_name ? live.first_name + ' ' + live.last_name : live.name) : player.name;

  return `<div class="match-card__player">
    <div class="match-card__player-avatar">${buildAvatarHtml(avatarSource)}</div>
    <span class="match-card__player-name">${displayName}</span>
  </div>`;
}

// ── Render Match Card ──
function renderMatchCard(match, media) {
  const teamA = typeof match.team_a === 'string' ? JSON.parse(match.team_a) : match.team_a;
  const teamB = typeof match.team_b === 'string' ? JSON.parse(match.team_b) : match.team_b;
  const isDraw = match.winner === 'draw';
  const winnerTeam = isDraw ? teamA : (match.winner === 'a' ? teamA : teamB);
  const loserTeam = isDraw ? teamB : (match.winner === 'a' ? teamB : teamA);
  const time = timeAgo(new Date(match.played_at));

  // Build media carousel if media exists
  let mediaHtml = '';
  if (media && media.length > 0) {
    const carouselId = 'carousel_' + match.id.replace(/-/g, '');
    const slides = media.map((m, idx) => {
      const profile = liveProfiles[m.user_id];
      const authorName = profile ? (profile.first_name || profile.name?.split(' ')[0] || 'Player') : 'Player';
      const authorAvatar = profile?.avatar_url
        ? `<img src="${profile.avatar_url}" alt="">`
        : (authorName[0] || '?');
      const mediaIcon = m.media_type === 'video' ? '🎥' : '📸';

      const mediaEl = m.media_type === 'video'
        ? `<div class="match-card__video-wrap">
            <video src="${m.media_url}" playsinline autoplay loop muted preload="metadata"></video>
            <button class="match-card__video-mute" onclick="toggleVideoMute(this, event)">🔇</button>
            <div class="match-card__video-pause" onclick="toggleVideoPlay(this, event)">
              <div class="match-card__video-pause-icon">▶</div>
            </div>
          </div>`
        : `<img src="${m.media_url}" alt="Game highlight" loading="lazy">`;

      const captionHtml = m.caption
        ? `<div class="match-card__media-text">${m.caption}</div>`
        : '';

      return `<div class="match-card__media-slide">
        ${mediaEl}
        <div class="match-card__media-caption">
          <div class="match-card__media-author">
            <div class="match-card__media-author-avatar">${authorAvatar}</div>
            ${mediaIcon} ${authorName}
          </div>
          ${captionHtml}
        </div>
      </div>`;
    }).join('');

    const dotsHtml = media.length > 1
      ? `<div class="match-card__media-dots">${media.map((_, i) => `<div class="match-card__media-dot${i === 0 ? ' match-card__media-dot--active' : ''}" data-idx="${i}"></div>`).join('')}</div>`
      : '';

    const navHtml = media.length > 1
      ? `<button class="match-card__media-nav match-card__media-nav--prev" onclick="event.stopPropagation();slideCarousel('${carouselId}', -1)">‹</button>
         <button class="match-card__media-nav match-card__media-nav--next" onclick="event.stopPropagation();slideCarousel('${carouselId}', 1)">›</button>`
      : '';

    mediaHtml = `<div class="match-card__media" id="${carouselId}" data-idx="0" data-count="${media.length}">
      ${navHtml}
      <div class="match-card__media-track">${slides}</div>
      ${dotsHtml}
    </div>`;
  }

  return `<div class="match-card">
    <div class="match-card__header">
      <span class="match-card__format">${match.format}</span>
      <span class="match-card__meta">${time}</span>
    </div>
    <div class="match-card__court">
      <span class="match-card__court-icon">📍</span>
      ${match.court_name}
    </div>
    ${mediaHtml}
    <div class="match-card__teams">
      <div class="match-card__team ${isDraw ? 'match-card__team--loser' : 'match-card__team--winner'}">
        <div class="match-card__team-result ${isDraw ? 'match-card__team-result--l' : 'match-card__team-result--w'}">${isDraw ? 'D' : 'W'}</div>
        <div class="match-card__team-players">
          ${winnerTeam.map(p => renderPlayer(p)).join('')}
        </div>
      </div>
      <div class="match-card__team match-card__team--loser">
        <div class="match-card__team-result match-card__team-result--l">${isDraw ? 'D' : 'L'}</div>
        <div class="match-card__team-players">
          ${loserTeam.map(p => renderPlayer(p)).join('')}
        </div>
      </div>
    </div>
    <div class="match-card__sprays">
      <button class="spray-btn ${(spraysByMatch[match.id] || []).length > 0 ? 'has-sprays' : ''}" onclick="event.stopPropagation();openPostDetail('${match.id}')">
        <svg width="14" height="14" viewBox="0 0 28 28" fill="none" style="vertical-align:-2px;"><path d="M6.125 6.125H6.13375M9.625 7.875H9.63375M13.125 9.625H13.1338M6.125 9.625H6.13375M9.625 11.375H9.63375M6.125 13.125H6.13375M20.125 11.375V7.875H16.625V11.375M20.125 11.375H16.625M20.125 11.375L21.875 13.125V21.875C21.875 22.4 21.525 22.75 21 22.75H15.75C15.225 22.75 14.875 22.4 14.875 21.875V13.125L16.625 11.375M14.875 15.75L21.875 14M14.875 20.125L21.875 18.375" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/></svg> ${(spraysByMatch[match.id] || []).length > 0 ? (spraysByMatch[match.id].length + ' Spray' + ((spraysByMatch[match.id].length !== 1) ? 's' : '')) : 'Spray'}
      </button>
    </div>
  </div>`;
}

// ── Carousel Navigation ──
function slideCarousel(carouselId, direction) {
  const el = document.getElementById(carouselId);
  if (!el) return;
  const count = parseInt(el.dataset.count);
  let idx = parseInt(el.dataset.idx) + direction;
  if (idx < 0) idx = 0;
  if (idx >= count) idx = count - 1;
  el.dataset.idx = idx;

  const track = el.querySelector('.match-card__media-track');
  track.style.transform = `translateX(-${idx * 100}%)`;

  // Update dots
  el.querySelectorAll('.match-card__media-dot').forEach((dot, i) => {
    dot.classList.toggle('match-card__media-dot--active', i === idx);
  });

  // Pause all videos, play the visible one if it's a video
  el.querySelectorAll('video').forEach(v => { v.pause(); });
  const activeSlide = el.querySelectorAll('.match-card__media-slide')[idx];
  const activeVideo = activeSlide?.querySelector('video');
  if (activeVideo) {
    activeVideo.play().catch(() => {});
    const pauseOverlay = activeSlide.querySelector('.match-card__video-pause');
    if (pauseOverlay) pauseOverlay.classList.remove('paused');
  }
}

// ── Video Controls ──
function toggleVideoPlay(overlayEl, e) {
  e.stopPropagation();
  const wrap = overlayEl.closest('.match-card__video-wrap');
  const video = wrap?.querySelector('video');
  if (!video) return;

  if (video.paused) {
    video.play().catch(() => {});
    overlayEl.classList.remove('paused');
  } else {
    video.pause();
    overlayEl.classList.add('paused');
  }
}

function toggleVideoMute(btn, e) {
  e.stopPropagation();
  const wrap = btn.closest('.match-card__video-wrap');
  const video = wrap?.querySelector('video');
  if (!video) return;

  video.muted = !video.muted;
  btn.textContent = video.muted ? '🔇' : '🔊';
}

// ── Touch Swipe for Carousel ──
document.addEventListener('touchstart', function(e) {
  const carousel = e.target.closest('.match-card__media');
  if (!carousel) return;
  carousel._touchX = e.touches[0].clientX;
}, { passive: true });

document.addEventListener('touchend', function(e) {
  const carousel = e.target.closest('.match-card__media');
  if (!carousel || !carousel._touchX) return;
  const diff = carousel._touchX - e.changedTouches[0].clientX;
  if (Math.abs(diff) > 40) {
    slideCarousel(carousel.id, diff > 0 ? 1 : -1);
  }
  carousel._touchX = null;
}, { passive: true });

// ── Build mini match card for post detail top ──
function buildPostDetailMatch(match) {
  const teamA = typeof match.team_a === 'string' ? JSON.parse(match.team_a) : match.team_a;
  const teamB = typeof match.team_b === 'string' ? JSON.parse(match.team_b) : match.team_b;
  const isDraw = match.winner === 'draw';
  const winnerTeam = isDraw ? teamA : (match.winner === 'a' ? teamA : teamB);
  const loserTeam = isDraw ? teamB : (match.winner === 'a' ? teamB : teamA);

  // Find the poster (first player of winning team)
  const poster = winnerTeam[0];
  const live = poster.user_id ? liveProfiles[poster.user_id] : null;
  const posterSource = live || poster;
  const posterName = live ? (live.first_name && live.last_name ? live.first_name + ' ' + live.last_name : live.name) : poster.name;

  // Opponent name(s)
  const opponentNames = loserTeam.map(p => {
    const ol = p.user_id ? liveProfiles[p.user_id] : null;
    return ol ? (ol.first_name && ol.last_name ? ol.first_name + ' ' + ol.last_name : ol.name) : p.name;
  }).join(', ');

  const timeStr = timeAgo(new Date(match.played_at));
  const resultText = isDraw ? 'drew with' : 'won against';

  return `<div style="display:flex;gap:8px;align-items:flex-start;">
    <div class="post-detail__spray-avatar">${buildAvatarHtml(posterSource)}</div>
    <div style="flex:1;display:flex;flex-direction:column;gap:4px;">
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <span style="font-family:'Montserrat',sans-serif;font-size:16px;font-weight:600;color:#fff;">${posterName}</span>
        <span style="font-family:'Montserrat',sans-serif;font-size:10px;font-weight:500;color:#c1c1c1;">${timeStr}</span>
      </div>
      <div style="font-family:'Montserrat',sans-serif;font-size:14px;font-weight:500;color:#fff;">
        ${resultText} <span style="font-weight:600;color:#f74501;">${opponentNames}</span>
      </div>
      <div style="font-family:'Montserrat',sans-serif;font-size:12px;color:#888;margin-top:2px;">
        📍 ${match.court_name} · ${match.format}
      </div>
    </div>
  </div>`;
}

// ── Build spray list for post detail ──
function buildSprayList(matchId) {
  const sprays = spraysByMatch[matchId] || [];
  if (sprays.length === 0) {
    return '<div class="post-detail__empty">No sprays yet. Be the first!</div>';
  }

  return sprays.map(s => {
    const profile = liveProfiles[s.user_id];
    const name = profile ? (profile.first_name && profile.last_name ? profile.first_name + ' ' + profile.last_name : profile.name) : 'Player';
    const avatarSource = profile || { initials: name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2) };
    const item = sprayItems[s.spray_item_id];
    const imgUrl = item ? item.preview_url : '';
    const timeStr = timeAgo(new Date(s.created_at));

    return `<div class="post-detail__spray-row">
      <div class="post-detail__spray-avatar">${buildAvatarHtml(avatarSource)}</div>
      <div class="post-detail__spray-info">
        <div class="post-detail__spray-name">${name}</div>
        <div class="post-detail__spray-time">${timeStr}</div>
      </div>
      <img class="post-detail__spray-img" src="${imgUrl}" alt="${item ? item.name : 'Spray'}"
        onerror="this.style.background='#222';this.style.objectFit='contain';">
    </div>`;
  }).join('');
}

// ── Open Spray Picker ──
function openSprayPicker() {
  if (!currentUser) return;

  selectedSprayId = null;
  const grid = document.getElementById('sprayPickerGrid');

  // Get user's owned sprays from inventory
  const ownedItems = Object.values(sprayItems).filter(item => userInventory.has(item.id));

        <img src="${item.preview_url}" alt="${item.name}"

// ── Select a Spray ──
function selectSpray(itemId, tileEl) {
  selectedSprayId = itemId;

  // Update tile borders
  document.querySelectorAll('.spray-picker__tile').forEach(t => t.classList.remove('selected'));
  tileEl.classList.add('selected');

  // Enable confirm button
  const confirmBtn = document.getElementById('sprayConfirmBtn');
  confirmBtn.style.opacity = '1';
  confirmBtn.style.cursor = 'pointer';
}

// ── Confirm Spray ──
async function confirmSpray() {
  if (!selectedSprayId || !activeMatchId || !currentUser) return;

  const isUpdate = userSprayedMatches.has(activeMatchId);

  try {
    const { error } = await supabase.from('post_sprays').upsert({
      match_id: activeMatchId,
      user_id: currentUser.id,
      spray_item_id: selectedSprayId
    }, { onConflict: 'match_id,user_id' });

    if (error) throw error;

    // Update local state
    if (!liveProfiles[currentUser.id] && currentProfile) {
      liveProfiles[currentUser.id] = currentProfile;
    }

    if (isUpdate) {
      // Replace existing spray in local cache
      const existing = (spraysByMatch[activeMatchId] || []).find(s => s.user_id === currentUser.id);
      if (existing) existing.spray_item_id = selectedSprayId;
    } else {
      // New spray
      const newSpray = {
        user_id: currentUser.id,
        spray_item_id: selectedSprayId,
        created_at: new Date().toISOString()
      };
      if (!spraysByMatch[activeMatchId]) spraysByMatch[activeMatchId] = [];
      spraysByMatch[activeMatchId].unshift(newSpray);
    }
    userSprayedMatches.add(activeMatchId);

    // Close picker, refresh detail and feed
    closeSprayPicker();
    openPostDetail(activeMatchId);
    refreshFeedSprayCounts();

  } catch (err) {
    console.error('Spray error:', err);
    // Use a simple DOM-based alert since we don't have the custom modal here
    const msg = document.createElement('div');
    msg.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#f74501;color:#fff;padding:12px 20px;border-radius:12px;z-index:9999;font-size:14px;font-weight:600;';
    msg.textContent = 'Could not spray. Try again.';
    document.body.appendChild(msg);
    setTimeout(() => msg.remove(), 3000);
  }
}

// ── Refresh spray counts on feed cards ──
function refreshFeedSprayCounts() {
  const list = document.getElementById('feedList');
  // Re-render the full feed to update spray counts
  const mediaByFeed = window.__mediaByFeed || {};
  list.innerHTML = feedData.map(match => renderMatchCard(match, mediaByFeed[match.id] || [])).join('');
}

/* ══════════════════════════════
   LOAD FEED
   1. Fetch match_feed
   2. Collect all user_ids from JSONB
   3. Batch-fetch live profiles
   4. Render with live data
   ══════════════════════════════ */
async function loadFeed() {
  const { data, error } = await supabase
    .from('match_feed')
    .select('*')
    .order('played_at', { ascending: false })
    .limit(50);

  const list = document.getElementById('feedList');

  if (error) {
    console.error('Feed load error:', error);
    list.innerHTML = `<div class="feed-empty">
      <div class="feed-empty__icon">⚠️</div>
      <div class="feed-empty__title">Load Error</div>
      <div class="feed-empty__desc">${error.message}</div>
    </div>`;
    return;
  }

  if (!data || data.length === 0) {
    list.innerHTML = `<div class="feed-empty">
      <div class="feed-empty__icon">🏀</div>
      <div class="feed-empty__title">No Games Yet</div>
      <div class="feed-empty__desc">When players complete games on AllNet, their results will show up here.</div>
    </div>`;
    return;
  }

  // Collect user_ids from team JSONB
  const userIds = new Set();
  data.forEach(match => {
    const teamA = typeof match.team_a === 'string' ? JSON.parse(match.team_a) : match.team_a;
    const teamB = typeof match.team_b === 'string' ? JSON.parse(match.team_b) : match.team_b;
    [...teamA, ...teamB].forEach(p => { if (p.user_id) userIds.add(p.user_id); });
  });

  const feedIds = data.map(m => m.id);
  let mediaByFeed = {};

  // ── PARALLEL ROUND 1: All independent queries at once ──
  try {
    const [profilesRes, mediaRes, sprayItemsRes, spraysRes, invRes] = await Promise.all([
      // 1. Profiles for team players
      userIds.size > 0
        ? supabase.from('profiles').select('id, name, first_name, last_name, initials, avatar_url, avatar_cutout_url, selected_cover').in('id', Array.from(userIds))
        : { data: [] },
      // 2. Public media for posts
      supabase.from('game_media').select('*').in('match_feed_id', feedIds).eq('is_public', true).order('created_at', { ascending: true }),
      // 3. Spray store items
      supabase.from('store_items').select('*').eq('type', 'spray'),
      // 4. Sprays for visible posts
      supabase.from('post_sprays').select('*').in('match_id', feedIds).order('created_at', { ascending: false }),
      // 5. User inventory
      currentUser
        ? supabase.from('user_inventory').select('item_id').eq('user_id', currentUser.id)
        : { data: [] }
    ]);

    // Process profiles
    if (profilesRes.data) profilesRes.data.forEach(p => { liveProfiles[p.id] = p; });

    // Process media
    const extraProfileIds = new Set();
    if (mediaRes.data) {
      mediaRes.data.forEach(m => {
        if (!mediaByFeed[m.match_feed_id]) mediaByFeed[m.match_feed_id] = [];
        mediaByFeed[m.match_feed_id].push(m);
        if (m.user_id && !liveProfiles[m.user_id]) extraProfileIds.add(m.user_id);
      });
    }

    // Process spray items
    if (sprayItemsRes.data) sprayItemsRes.data.forEach(si => { sprayItems[si.id] = si; });

    // Process sprays
    if (spraysRes.data) {
      spraysRes.data.forEach(s => {
        if (!spraysByMatch[s.match_id]) spraysByMatch[s.match_id] = [];
        spraysByMatch[s.match_id].push(s);
        if (currentUser && s.user_id === currentUser.id) userSprayedMatches.add(s.match_id);
        if (s.user_id && !liveProfiles[s.user_id]) extraProfileIds.add(s.user_id);
      });
    }

    // Process inventory
    if (invRes.data) userInventory = new Set(invRes.data.map(i => i.item_id));

    // ── ROUND 2: Fetch any missing profiles ──
    if (extraProfileIds.size > 0) {
      const { data: extras } = await supabase
        .from('profiles')
        .select('id, name, first_name, last_name, initials, avatar_url, avatar_cutout_url, selected_cover')
        .in('id', Array.from(extraProfileIds));
      if (extras) extras.forEach(p => { liveProfiles[p.id] = p; });
    }
  } catch (loadErr) {
    console.error('Feed data load error:', loadErr);
  }

  // Store caches and render
  window.__mediaByFeed = mediaByFeed;
  feedData = data;
  list.innerHTML = data.map(match => renderMatchCard(match, mediaByFeed[match.id] || [])).join('');
}

// ── Init ──
async function initActivityPage() {
  const { data: { session } } = await supabase.auth.getSession();
  if (session) {
    currentUser = session.user;
    currentProfile = await getUserProfile(currentUser.id);
    updateNavDrawerUser();
  }
  await loadFeed();

  // Deep link: ?match=xxx opens post detail automatically
  const params = new URLSearchParams(window.location.search);
  const matchParam = params.get('match');
  if (matchParam && feedData.find(m => m.id === matchParam)) {
    setTimeout(() => openPostDetail(matchParam), 300);
  }
}

initActivityPage();
</script>
