<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AllNet — Signing in...</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0A0A0A; color: #fff; font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; padding: 24px; }
  .card { text-align: center; width: 100%; max-width: 320px; }
  .card h2 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
  .card p { color: #999; font-size: 14px; margin-bottom: 24px; line-height: 1.5; }
  .btn { display: block; width: 100%; padding: 16px; background: #FF5A1F; color: #fff; text-decoration: none; border-radius: 12px; font-size: 16px; font-weight: 600; text-align: center; }
  .btn:active { background: #E5500F; }
</style>
</head>
<body>
<div class="card">
  <h2>You're signed in!</h2>
  <p>Tap below to return to the app.</p>
  <a id="returnBtn" class="btn" href="allnet://auth-callback">Open AllNet</a>
</div>
<script>
  // Pass auth tokens (from URL hash fragment) to the deep link
  var hash = window.location.hash || '';
  var btn = document.getElementById('returnBtn');
  if (hash) {
    btn.href = 'allnet://auth-callback' + hash;
  }
</script>
</body>
</html>
