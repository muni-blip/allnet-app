<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script defer data-domain="allnetgames.com" src="https://plausible.io/js/script.tagged-events.js"></script>
<script src="js/posthog.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AllNet — Group</title>
<meta property="og:type" content="website">
<meta property="og:site_name" content="AllNet">
<meta property="og:title" content="AllNet — Group">
<meta property="og:description" content="Check out this group on AllNet — the pickup basketball reputation network.">
<meta property="og:image" content="https://allnetgames.com/img/icon-512.png">
<meta name="twitter:card" content="summary_large_image">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Oswald:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--orange:#F74501;--border:#222;--card:#111;--muted:#666;--subtle:#999}
html,body{height:auto;overflow:auto;background:#000;color:#fff;font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased}
.topbar{position:sticky;top:0;z-index:100;padding:14px 16px;background:rgba(0,0,0,0.95);backdrop-filter:blur(16px);display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.topbar__logo{display:flex;align-items:center;gap:8px;text-decoration:none}
.topbar__logo img{height:22px}
.topbar__join{padding:8px 20px;font-family:'Montserrat',sans-serif;font-weight:700;font-size:13px;color:#fff;background:var(--orange);border:none;border-radius:8px;cursor:pointer;text-decoration:none;transition:opacity 0.2s}
.topbar__join:hover{opacity:0.85}
.gradient-bar{width:100%;height:4px}
.gradient-bar img{width:100%;height:4px;object-fit:cover;display:block}
.container{max-width:560px;margin:0 auto;padding:0 16px 80px}
.hero{display:flex;flex-direction:column;align-items:center;padding:40px 0 24px;gap:16px}
.hero__logo{width:96px;height:96px;border-radius:50%;object-fit:cover;border:3px solid var(--border)}
.hero__logo-fallback{width:96px;height:96px;border-radius:50%;background:var(--orange);display:flex;align-items:center;justify-content:center;font-family:'Oswald',sans-serif;font-size:40px;font-weight:700;color:#fff;border:3px solid var(--border)}
.hero__name{font-family:'Oswald',sans-serif;font-size:32px;font-weight:700;text-transform:uppercase;letter-spacing:1px;text-align:center}
.hero__location{font-size:14px;color:var(--subtle);display:flex;align-items:center;gap:6px}
.hero__location svg{width:14px;height:14px;fill:var(--subtle)}
.hero__description{font-size:15px;color:var(--subtle);text-align:center;line-height:1.5;max-width:440px}
.stats-bar{display:flex;gap:10px;justify-content:center;margin-bottom:24px}
.stat-pill{padding:8px 18px;background:#1a1a1a;border:1px solid var(--border);border-radius:50px;font-family:'Montserrat',sans-serif;font-weight:700;font-size:13px;color:#fff;display:flex;align-items:center;gap:6px}
.stat-pill__count{color:var(--orange)}
.social-row{display:flex;gap:12px;justify-content:center;margin-bottom:32px}
.social-link{width:44px;height:44px;border-radius:50%;background:#1a1a1a;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;text-decoration:none;transition:background 0.2s}
.social-link:hover{background:#2a2a2a}
.social-link svg{width:20px;height:20px;fill:#fff}
.section{margin-bottom:32px}
.section__title{font-family:'Montserrat',sans-serif;font-weight:800;font-size:12px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:14px}
.session-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:12px;transition:border-color 0.2s}
.session-card:hover{border-color:#333}
.session-card__title{font-family:'Oswald',sans-serif;font-size:20px;font-weight:600;margin-bottom:8px}
.session-card__meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:10px}
.session-card__tag{font-size:13px;color:var(--subtle)}
.session-card__dot{color:var(--muted);font-size:13px}
.session-card__spots{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.session-card__spots-bar{flex:1;height:6px;background:#222;border-radius:3px;overflow:hidden}
.session-card__spots-fill{height:100%;background:var(--orange);border-radius:3px;transition:width 0.3s}
.session-card__spots-text{font-family:'Montserrat',sans-serif;font-size:12px;font-weight:700;color:var(--subtle);white-space:nowrap}
.session-card__cta{display:block;width:100%;padding:12px;background:var(--orange);border:none;border-radius:8px;font-family:'Montserrat',sans-serif;font-weight:700;font-size:14px;color:#fff;text-align:center;text-decoration:none;cursor:pointer;transition:opacity 0.2s}
.session-card__cta:hover{opacity:0.85}
.past-item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #1a1a1a}
.past-item__title{font-size:14px;font-weight:600;color:#fff}
.past-item__date{font-size:13px;color:var(--muted)}
.download-banner{background:linear-gradient(135deg,#111 0%,#1a1a1a 100%);border:1px solid var(--border);border-radius:16px;padding:32px 24px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:16px;margin-bottom:32px}
.download-banner__title{font-family:'Oswald',sans-serif;font-size:22px;font-weight:700}
.download-banner__subtitle{font-size:14px;color:var(--subtle);max-width:320px}
.download-banner__badges{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.download-banner__badge{height:44px;border-radius:8px;background:#1a1a1a;border:1px solid var(--border);padding:0 20px;display:flex;align-items:center;gap:8px;font-family:'Montserrat',sans-serif;font-weight:700;font-size:13px;color:#fff;text-decoration:none;transition:background 0.2s}
.download-banner__badge:hover{background:#2a2a2a}
.download-banner__badge svg{width:20px;height:20px;fill:#fff}
.footer{text-align:center;padding:24px 0;border-top:1px solid #1a1a1a}
.footer__links{display:flex;gap:16px;justify-content:center;margin-bottom:8px}
.footer__links a{font-size:12px;color:var(--muted);text-decoration:none}
.footer__links a:hover{color:var(--subtle)}
.footer__copy{font-size:11px;color:#333}
.loading{display:flex;justify-content:center;align-items:center;height:300px}
.spinner{width:36px;height:36px;border:3px solid #222;border-top-color:var(--orange);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:14px}
</style>
</head>
<body>
<div class="topbar">
  <a href="/" class="topbar__logo"><img src="/img/allnet-wordmark.png" alt="AllNet" onerror="this.outerHTML='<span style=\'font-family:Oswald;font-weight:700;font-size:18px;color:#fff\'>ALLNET</span>'"></a>
  <a href="#download" class="topbar__join">Get the App</a>
</div>
<div class="gradient-bar"><img src="https://orrpowyewsioyxztwkdq.supabase.co/storage/v1/object/public/assets/gradient-bar-min.png" alt=""></div>
<div class="container" id="root"><div class="loading"><div class="spinner"></div></div></div>
<script>
const SB='https://orrpowyewsioyxztwkdq.supabase.co';
const AK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9ycnBvd3lld3Npb3l4enR3a2RxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3ODAwNzMsImV4cCI6MjA4OTM1NjA3M30.4K6ZT-eNOGbvXxJkN_Dt7aLv80GlC0rrTLcIUPExwp0';
const slug=window.location.pathname.split('/org/')[1]?.replace(/\/$/,'')||'';
async function loadPage(){
if(!slug){window.location.href='/';return}
const res=await fetch(`${SB}/rest/v1/rpc/get_org_public_page`,{method:'POST',headers:{'Content-Type':'application/json',apikey:AK,Authorization:`Bearer ${AK}`},body:JSON.stringify({p_org_slug:slug})});
const data=await res.json();
if(data.error){document.getElementById('root').innerHTML='<div class="empty">Group not found</div>';return}
const{org,member_count,session_count,upcoming_sessions,past_sessions}=data;
const root=document.getElementById('root');
let h='';
h+='<div class="hero">';
if(org.logo_url&&!org.logo_url.startsWith('/'))h+=`<img class="hero__logo" src="${esc(org.logo_url)}" alt="${esc(org.name)}" onerror="this.outerHTML='<div class=\\'hero__logo-fallback\\'>${esc(org.name[0])}</div>'">`;
else h+=`<div class="hero__logo-fallback">${esc(org.name[0])}</div>`;
h+=`<div class="hero__name">${esc(org.name)}</div>`;
if(org.location)h+=`<div class="hero__location"><svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 010-5 2.5 2.5 0 010 5z"/></svg>${esc(org.location)}</div>`;
if(org.description)h+=`<div class="hero__description">${esc(org.description)}</div>`;
h+='</div>';
h+='<div class="stats-bar">';
h+=`<div class="stat-pill"><span class="stat-pill__count">${member_count}</span> members</div>`;
h+=`<div class="stat-pill"><span class="stat-pill__count">${session_count}</span> sessions</div>`;
h+='</div>';
if(org.instagram_handle||org.website_url){
h+='<div class="social-row">';
if(org.instagram_handle)h+=`<a class="social-link" href="https://instagram.com/${esc(org.instagram_handle)}" target="_blank" rel="noopener"><svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg></a>`;
if(org.website_url)h+=`<a class="social-link" href="${esc(org.website_url)}" target="_blank" rel="noopener"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg></a>`;
h+='</div>';
}
if(upcoming_sessions&&upcoming_sessions.length>0){
h+='<div class="section"><div class="section__title">Upcoming Runs</div>';
upcoming_sessions.forEach(s=>{
const pct=s.max_players>0?Math.round((s.confirmed_count/s.max_players)*100):0;
h+=`<div class="session-card"><div class="session-card__title">${esc(s.title)}</div><div class="session-card__meta"><span class="session-card__tag">${formatDate(s.date)}</span><span class="session-card__dot">·</span><span class="session-card__tag">${formatTime(s.start_time,s.end_time)}</span>${s.venue_name?`<span class="session-card__dot">·</span><span class="session-card__tag">${esc(s.venue_name)}</span>`:''}</div><div class="session-card__spots"><div class="session-card__spots-bar"><div class="session-card__spots-fill" style="width:${pct}%"></div></div><span class="session-card__spots-text">${s.confirmed_count}/${s.max_players}</span></div><a class="session-card__cta" href="#download">Get the App to Register</a></div>`;
});
h+='</div>';
}
h+='<div class="download-banner" id="download"><div class="download-banner__title">Join the Run</div><div class="download-banner__subtitle">Download AllNet to register for sessions, build your reputation, and connect with local hoopers.</div><div class="download-banner__badges"><a class="download-banner__badge" href="#" target="_blank"><svg viewBox="0 0 24 24"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83z"/><path d="M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>App Store</a><a class="download-banner__badge" href="#" target="_blank"><svg viewBox="0 0 24 24"><path d="M3 20.5v-17c0-.83.52-1.28 1-1.5l10 10-10 10c-.48-.22-1-.67-1-1.5zm15.54-7.77l-2.82-1.63L12.9 12l2.82 2.9 2.82-1.63c.91-.52.91-1.82 0-2.54zM4.54 2.1L14.44 12 4.54 21.9c0 .01-.01.01-.01.02l.01-19.84zM14.44 12L4.54 2.1l10.68 6.17L14.44 12z"/></svg>Google Play</a></div></div>';
if(past_sessions&&past_sessions.length>0){
h+='<div class="section"><div class="section__title">Past Sessions</div>';
past_sessions.forEach(s=>{h+=`<div class="past-item"><span class="past-item__title">${esc(s.title)}</span><span class="past-item__date">${formatDate(s.date)}</span></div>`});
h+='</div>';
}
h+='<div class="footer"><div class="footer__links"><a href="/privacy">Privacy</a><a href="/terms">Terms</a></div><div class="footer__copy">&copy; 2026 AllNet</div></div>';
root.innerHTML=h;
}
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function formatDate(ds){const d=new Date(ds+'T12:00:00'),n=new Date(),t=new Date(n);t.setDate(t.getDate()+1);if(d.toDateString()===n.toDateString())return'Today';if(d.toDateString()===t.toDateString())return'Tomorrow';return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}
function formatTime(s,e){if(!s)return'TBD';const f=t=>{const[h,m]=t.split(':').map(Number);const a=h>=12?'PM':'AM';const hr=h%12||12;return m>0?`${hr}:${String(m).padStart(2,'0')} ${a}`:`${hr} ${a}`};return e?`${f(s)} – ${f(e)}`:f(s)}
loadPage();
</script>
</body>
</html>
