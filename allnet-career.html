<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AllNet — Your Career Card</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Oswald:wght@400;500;600;700&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/app.css">
<link rel="stylesheet" href="css/career-card.css">
<style>
html, body { height: auto; overflow: auto; }
.career-page { min-height: 100vh; background: #000; padding-bottom: 60px; }

.career-topbar { position: sticky; top: 0; z-index: 100; padding: 14px 16px; background: rgba(0,0,0,0.95); backdrop-filter: blur(16px); display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); }
.career-topbar__menu { width: 48px; height: 48px; border-radius: 999px; background: #000; border: 1px solid #222; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
.career-topbar__title { flex: 1; font-family: 'Montserrat', sans-serif; font-size: 16px; font-weight: 600; color: #fff; text-align: center; line-height: 24px; }

.cc-wrapper { padding: 20px 16px 0; }
.cc-actions { display: flex; gap: 16px; padding: 40px 16px 0; max-width: 375px; margin: 0 auto; }
.cc-action-btn { flex: 1; font-family: 'Montserrat', sans-serif; font-weight: 600; font-size: 14px; line-height: 16px; color: #fff; background: transparent; border: 1px solid #5a5a5a; padding: 12px 32px; cursor: pointer; transition: all 0.2s; }
.cc-action-btn:hover { border-color: #fff; }

.match-history { padding: 40px 16px 0; max-width: 375px; margin: 0 auto; }
.match-history__title { font-family: 'Montserrat', sans-serif; font-weight: 600; font-size: 14px; line-height: 16px; color: #fff; margin-bottom: 16px; }
.match-history__empty { text-align: center; padding: 32px 16px; color: #666; font-size: 14px; font-family: 'Montserrat', sans-serif; }
.mh-row { width: 100%; max-width: 343px; height: 108px; background: #181818; border: 1px solid #2e2e2e; position: relative; margin: 0 auto 16px; cursor: pointer; overflow: hidden; }
.mh-row__thumb { position: absolute; left: -1px; top: -1px; width: 108px; height: 108px; overflow: hidden; background: #111; }
.mh-row__thumb-cover { position: absolute; inset: 0; background-size: cover; background-position: center; }
.mh-row__thumb-cutout { position: absolute; left: 0; top: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
.mh-row__thumb-initials { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 20px; color: #666; }
.mh-row__info { position: absolute; left: 119px; top: 11px; }
.mh-row__name { font-family: 'Montserrat', sans-serif; font-weight: 600; font-size: 16px; line-height: 24px; color: #fff; }
.mh-row__stars { display: flex; align-items: center; gap: 4px; }
.mh-row__stars-icons { display: flex; gap: 2px; }
.mh-row__star { width: 8px; height: 8px; }
.mh-row__star--empty { opacity: 0.3; }
.mh-row__stars-count { font-family: 'Montserrat', sans-serif; font-weight: 500; font-size: 10px; line-height: 12px; color: #c4c4c4; }
.mh-row__skill { display: flex; align-items: center; gap: 4px; margin-top: 8px; }
.mh-row__skill-label { font-family: 'Montserrat', sans-serif; font-weight: 600; font-size: 12px; line-height: 16px; color: #c4c4c4; }
.mh-row__skill-bars { display: flex; gap: 2px; }
.mh-row__skill-bar { width: 4px; height: 8px; }
.mh-row__skill-bar--filled { background: #F74501; }
.mh-row__skill-bar--empty { background: rgba(247,69,1,0.2); }
.mh-row__result { position: absolute; left: 119px; top: 79px; font-family: 'Montserrat', sans-serif; font-weight: 600; font-size: 12px; line-height: 16px; color: #c4c4c4; }

.photo-modal-overlay { position: fixed; inset: 0; z-index: 500; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; padding: 20px; }
.photo-modal-overlay.active { display: flex; }
.photo-modal { background: #1a1a1a; border-radius: 16px; padding: 28px 24px; max-width: 340px; width: 100%; text-align: center; }
.photo-modal__title { font-family: 'Montserrat', sans-serif; font-size: 18px; font-weight: 700; text-transform: uppercase; color: #fff; margin-bottom: 8px; }
.photo-modal__text { font-size: 14px; color: #999; margin-bottom: 20px; font-family: 'Montserrat', sans-serif; line-height: 1.5; }
.photo-modal__preview { width: 120px; height: 120px; border-radius: 50%; overflow: hidden; margin: 0 auto 20px; background: #111; display: none; align-items: center; justify-content: center; }
.photo-modal__preview.has-image { display: flex; }
.photo-modal__preview img { width: 100%; height: 100%; object-fit: cover; }
.photo-modal__upload-btn { width: 100%; padding: 14px; font-family: 'Montserrat', sans-serif; font-size: 14px; font-weight: 700; text-transform: uppercase; background: #F74501; color: #fff; border: none; border-radius: 8px; cursor: pointer; margin-bottom: 10px; }
.photo-modal__cancel-btn { width: 100%; padding: 12px; font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 600; text-transform: uppercase; background: transparent; color: #999; border: 1px solid #333; border-radius: 8px; cursor: pointer; }
.photo-modal__processing { display: none; flex-direction: column; align-items: center; gap: 12px; padding: 20px 0; }
.photo-modal__processing.active { display: flex; }
.photo-modal__spinner { font-size: 28px; animation: spin 1.2s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.photo-modal__status { font-size: 13px; color: #999; }

/* ── Player Card Sheet ── */
.player-sheet-overlay { position: fixed; inset: 0; z-index: 400; background: rgba(0,0,0,0.7); display: none; align-items: flex-end; justify-content: center; }
.player-sheet-overlay.active { display: flex; }
.player-sheet { width: 100%; max-width: 420px; background: #111; border-radius: 20px 20px 0 0; padding: 12px 16px 32px; max-height: 90vh; overflow-y: auto; animation: sheetSlideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1); }
@keyframes sheetSlideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.player-sheet__handle { width: 36px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; margin: 0 auto 16px; }
.player-sheet__loading { text-align: center; padding: 60px 0; color: #666; font-family: 'Montserrat', sans-serif; font-size: 14px; }
.player-sheet__close { display: flex; justify-content: center; margin-top: 16px; }
.player-sheet__close-btn { width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.1); border: none; color: #fff; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
.player-sheet__close-btn:hover { background: rgba(255,255,255,0.15); }
</style>
</head>
<body>
<div class="career-page" id="careerPage">
  <div class="career-topbar">
    <button class="career-topbar__menu" onclick="openNavDrawer()" aria-label="Menu">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#F74501" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    </button>
    <div class="career-topbar__title">Your Career Card</div>
    <div style="width:48px;flex-shrink:0;"></div>
  </div>
  <div class="nav-drawer-overlay" id="navOverlay" onclick="closeNavDrawer()"></div>
  <div class="nav-drawer" id="navDrawer">
    <div class="nav-drawer__header">
      <svg height="20" viewBox="0 0 685 318" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M546.941 97.7H653.081V121.712H613.757V219.5H586.439V121.712H546.941V97.7Z" fill="white"/><path d="M538.737 121.712H482.883V146.594H516.813V170.606H482.883V195.488H538.737V219.5H455.565V97.7H538.737V121.712Z" fill="white"/><path d="M407.304 97.7H434.622V219.5H407.304V185.744L362.238 144.854V219.5H334.92V97.7H362.238V108.314L407.304 149.03V97.7Z" fill="white"/><path d="M267.07 195.488H322.924V219.5H255.064L239.752 204.188V97.7H267.07V195.488Z" fill="white"/><path d="M172.423 195.488H228.277V219.5H160.417L145.105 204.188V97.7H172.423V195.488Z" fill="white"/><path d="M109.74 97.7L125.052 113.012V219.5H97.734V194.792H58.236V291.5L30.918 307.5V113.012L46.23 97.7H109.74ZM58.236 170.606H97.734V121.712H58.236V170.606Z" fill="white"/><path d="M626 26.5L653 10.5V98.5H626V26.5Z" fill="white"/></svg>
      <button class="nav-drawer__close" onclick="closeNavDrawer()">✕</button>
    </div>
    <nav class="nav-drawer__links">
      <a href="allnet-app.html" class="nav-drawer__link" data-nav="play"><span class="nav-drawer__link-icon">🏀</span><span class="nav-drawer__link-label">Play</span></a>
      <a href="allnet-activity.html" class="nav-drawer__link" data-nav="activity"><span class="nav-drawer__link-icon">📊</span><span class="nav-drawer__link-label">Activity</span></a>
      <a href="allnet-career.html" class="nav-drawer__link nav-drawer__link--active" data-nav="career"><span class="nav-drawer__link-icon">🏆</span><span class="nav-drawer__link-label">Career</span></a>
      <a href="allnet-stars.html" class="nav-drawer__link" data-nav="stars"><span class="nav-drawer__link-icon">⭐</span><span class="nav-drawer__link-label">Stars</span></a>
      <a href="#" class="nav-drawer__link nav-drawer__link--soon" onclick="return false" data-nav="settings"><span class="nav-drawer__link-icon">⚙️</span><span class="nav-drawer__link-label">Settings</span><span class="nav-drawer__link-badge">Soon</span></a>
    </nav>
    <div class="nav-drawer__footer"><div class="nav-drawer__user" id="navUser" style="display:none;"><div class="nav-drawer__user-avatar" id="navAvatar">U</div><div class="nav-drawer__user-info"><div class="nav-drawer__user-name" id="navUserName">Player</div><div class="nav-drawer__user-stars" id="navUserStars">⭐ 0</div></div></div></div>
  </div>
  <div class="cc-wrapper"><div class="cc-border"><div class="cc" id="careerCard"><div class="cc__placeholder"><div class="cc__placeholder-icon">📷</div><div class="cc__placeholder-text">Upload a photo to generate your career card</div></div></div></div></div>
  <div class="cc-actions"><button class="cc-action-btn" onclick="openPhotoModal()">CHANGE PHOTO</button><button class="cc-action-btn" onclick="openCoverPicker()">UPDATE COVER</button></div>

</div>
<div class="photo-modal-overlay" id="photoModal"><div class="photo-modal"><div class="photo-modal__title">Change Photo</div><div class="photo-modal__text">Upload a new photo. We'll remove the background automatically.</div><div class="photo-modal__preview" id="photoPreview"><img id="photoPreviewImg" src="" alt=""></div><div class="photo-modal__processing" id="photoProcessing"><div class="photo-modal__spinner">⚡</div><div class="photo-modal__status" id="photoStatus">Removing background...</div></div><input type="file" id="photoInput" accept="image/*" style="display:none" onchange="handlePhotoSelect(event)"><button class="photo-modal__upload-btn" id="photoUploadBtn" onclick="document.getElementById('photoInput').click()">Choose Photo</button><button class="photo-modal__cancel-btn" onclick="closePhotoModal()">Cancel</button></div></div>

<!-- Player Card Sheet -->
<div class="player-sheet-overlay" id="playerSheetOverlay" onclick="if(event.target===this)closePlayerSheet()">
  <div class="player-sheet" onclick="event.stopPropagation()">
    <div class="player-sheet__handle"></div>
    <div class="cc-border"><div class="cc" id="playerSheetCard"><div class="player-sheet__loading">Loading...</div></div></div>
    <div class="player-sheet__close">
      <button class="player-sheet__close-btn" onclick="closePlayerSheet()">✕</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/supabase-helpers.js"></script>
<script src="js/career-card.js"></script>
<script>
/* ══════════════════════════════
   CAREER PAGE — uses CareerCard component
   ══════════════════════════════ */
var currentUser = null, currentProfile = null, divisionStats = {}, activeDivision = '1v1';

// Expose COVERS from component for match history thumbnails
var COVERS = CareerCard.COVERS;

function openNavDrawer() { document.getElementById('navOverlay').classList.add('open'); document.getElementById('navDrawer').classList.add('open'); }
function closeNavDrawer() { document.getElementById('navOverlay').classList.remove('open'); document.getElementById('navDrawer').classList.remove('open'); }
function updateNavDrawerUser() {
  var n = document.getElementById('navUser');
  if (!n || !currentUser || !currentProfile) return;
  n.style.display = 'flex';
  document.getElementById('navUserName').textContent = currentProfile.name || 'Player';
  document.getElementById('navUserStars').textContent = '⭐ ' + (currentProfile.stars_balance || 0).toLocaleString();
  var a = document.getElementById('navAvatar');
  if (a && currentProfile.avatar_url) a.innerHTML = '<img src="' + currentProfile.avatar_url + '" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">';
  else if (a) a.textContent = currentProfile.initials || 'U';
}

function starSvg(f) {
  return f ? '<svg class="mh-row__star" viewBox="0 0 8 8" fill="#facc15"><polygon points="4,0.5 5.1,2.8 7.6,3.1 5.8,4.8 6.2,7.3 4,6.1 1.8,7.3 2.2,4.8 0.4,3.1 2.9,2.8"/></svg>'
           : '<svg class="mh-row__star mh-row__star--empty" viewBox="0 0 8 8" fill="#444"><polygon points="4,0.5 5.1,2.8 7.6,3.1 5.8,4.8 6.2,7.3 4,6.1 1.8,7.3 2.2,4.8 0.4,3.1 2.9,2.8"/></svg>';
}

/* ── Render card using shared component ── */
function renderCard() {
  var c = document.getElementById('careerCard');
  if (!c) return;

  var ds = divisionStats[activeDivision];

  c.innerHTML = CareerCard.render({
    cardId: 'cc',
    firstName: currentProfile?.first_name || currentProfile?.name?.split(' ')[0] || '',
    lastName: currentProfile?.last_name || currentProfile?.name?.split(' ').slice(1).join(' ') || '',
    cutoutUrl: currentProfile?.avatar_cutout_url,
    coverSlug: currentProfile?.selected_cover || 'crossover',
    showPlaceholder: !currentProfile?.avatar_cutout_url,
    wins: ds?.wins || 0,
    losses: ds?.losses || 0,
    draws: ds?.draws || 0,
    skillRating: ds?.skill_rating ? Number(ds.skill_rating).toFixed(1) : '—',
    socialRating: currentProfile?.social_rating ? Number(currentProfile.social_rating).toFixed(1) : '—',
    divisionLabel: activeDivision.toUpperCase(),
    activeDivision: activeDivision,
    showTabs: true,
    onTabClick: 'switchDivision',
    showDeltas: false
  });

  requestAnimationFrame(function() { CareerCard.fitNames('cc'); });
}

function switchDivision(dv) { activeDivision = dv; renderCard(); }

async function loadDivisionStats() {
  var res = await supabase.from('player_division_stats').select('*').eq('user_id', currentUser.id);
  if (res.data) res.data.forEach(function(r) { divisionStats[r.division] = r; });
  var best = '1v1', bg = 0;
  for (var dv in divisionStats) { if (divisionStats[dv].games_count > bg) { bg = divisionStats[dv].games_count; best = dv; } }
  if (bg > 0) activeDivision = best;
}

/* ── Match History ── */
var oppDivisionStats = {}; // { odp_userId_division: { skill_rating, ... } }

async function loadMatchHistory() {
  var pgRes = await supabase.from('game_players').select('game_id,team').eq('user_id', currentUser.id);
  var pg = pgRes.data;
  if (!pg || !pg.length) { updateMH([]); return; }
  var gids = pg.map(function(p) { return p.game_id; }), tm = {};
  pg.forEach(function(p) { tm[p.game_id] = p.team; });
  var gRes = await supabase.from('game_sessions').select('id,format,winner,ended_at').in('id', gids).in('status', ['completed','nulled']).order('ended_at', { ascending: false }).limit(50);
  var games = gRes.data;
  if (!games || !games.length) { updateMH([]); return; }
  var apRes = await supabase.from('game_players').select('game_id,user_id,team').in('game_id', gids);
  var ap = apRes.data;
  var oids = new Set(); if (ap) ap.forEach(function(a) { if (a.user_id !== currentUser.id) oids.add(a.user_id); });
  var op = {};
  if (oids.size > 0) {
    var prRes = await supabase.from('profiles').select('id,name,first_name,last_name,avatar_url,avatar_cutout_url,selected_cover,social_rating,skill_rating').in('id', Array.from(oids));
    if (prRes.data) prRes.data.forEach(function(p) { op[p.id] = p; });

    // Fetch per-division stats for all opponents
    var dsRes = await supabase.from('player_division_stats').select('user_id,division,skill_rating').in('user_id', Array.from(oids));
    if (dsRes.data) dsRes.data.forEach(function(ds) {
      oppDivisionStats[ds.user_id + '_' + ds.division] = ds;
    });
  }
  var rows = games.map(function(g) { var mt = tm[g.id]; var r = 'DRAW'; if (g.winner === 'team_' + mt) r = 'WIN'; else if (g.winner && g.winner !== 'draw' && g.winner !== 'null') r = 'LOSE'; var o = null; if (ap) { var x = ap.find(function(a) { return a.game_id === g.id && a.user_id !== currentUser.id && a.team !== mt; }) || ap.find(function(a) { return a.game_id === g.id && a.user_id !== currentUser.id; }); if (x) o = op[x.user_id]; } return { game: g, result: r, opp: o }; });
  updateMH(rows);
}

// Division thumbnail images for team games
var DIV_THUMBS = {
  '2v2': 'img/2v2.png',
  '3v3': 'img/3v3.png',
  '4v4': 'img/4v4.png',
  '5v5': 'img/5v5.png'
};

function updateMH(rows) {
  document.getElementById('matchHistoryTitle').textContent = 'MATCH HISTORY (' + rows.length + ')';
  var el = document.getElementById('matchHistoryList');
  if (!rows.length) { el.innerHTML = '<div class="match-history__empty">No matches yet.</div>'; return; }
  el.innerHTML = rows.map(function(item) {
    var g = item.game, r = item.result, opp = item.opp;
    var isTeamGame = g.format !== '1v1';
    var nm = isTeamGame ? g.format.toUpperCase() : (opp ? (opp.first_name && opp.last_name ? opp.first_name + ' ' + opp.last_name : opp.name) : 'Unknown Player');

    // Social rating from profile
    var sv = opp && opp.social_rating ? Number(opp.social_rating) : 0; var sc = opp && opp.social_rating ? '(' + Math.round(sv) + ')' : '';
    var fs = Math.round(sv); var sh = ''; for (var i = 0; i < 5; i++) sh += starSvg(i < fs);

    // Skill rating from per-division stats (not overall profile rating)
    var divStat = opp ? oppDivisionStats[opp.id + '_' + g.format] : null;
    var skv = divStat && divStat.skill_rating ? Math.round(Number(divStat.skill_rating)) : 0;
    var bh = ''; for (var i = 0; i < 5; i++) bh += '<div class="mh-row__skill-bar ' + (i < skv ? 'mh-row__skill-bar--filled' : 'mh-row__skill-bar--empty') + '"></div>';

    // Thumbnail: division image for team games, opponent avatar for 1v1
    var th;
    if (isTeamGame && DIV_THUMBS[g.format]) {
      th = '<img src="' + DIV_THUMBS[g.format] + '" style="width:100%;height:100%;object-fit:cover;" alt="' + g.format + '">';
    } else {
      var cs = opp && opp.selected_cover ? opp.selected_cover : 'crossover', cu = COVERS[cs] || COVERS.crossover, ct = opp ? opp.avatar_cutout_url : null;
      var ini = nm.split(' ').map(function(w) { return w[0]; }).join('').toUpperCase().slice(0, 2);
      th = ct ? '<div class="mh-row__thumb-cover" style="background-image:url(\'' + cu + '\')"></div><img class="mh-row__thumb-cutout" src="' + ct + '" alt="" onerror="this.style.display=\'none\'">' : opp && opp.avatar_url ? '<img src="' + opp.avatar_url + '" style="width:100%;height:100%;object-fit:cover;">' : '<div class="mh-row__thumb-initials">' + ini + '</div>';
    }

    // For team games, show format + court info instead of opponent social/skill
    var infoHtml;
    if (isTeamGame) {
      infoHtml = '<div class="mh-row__info"><div class="mh-row__name">' + nm + '</div><div class="mh-row__skill"><span class="mh-row__skill-label">' + g.format.toUpperCase() + ' DIVISION</span></div></div>';
    } else {
      infoHtml = '<div class="mh-row__info"><div class="mh-row__name">' + nm + '</div><div class="mh-row__stars"><div class="mh-row__stars-icons">' + sh + '</div><span class="mh-row__stars-count">' + sc + '</span></div><div class="mh-row__skill"><span class="mh-row__skill-label">SKILL LEVEL</span><div class="mh-row__skill-bars">' + bh + '</div></div></div>';
    }

    var clickTarget = isTeamGame ? '' : (opp ? opp.id : '');
    return '<div class="mh-row" onclick="openPlayerCard(\'' + clickTarget + '\')">' + '<div class="mh-row__thumb">' + th + '</div>' + infoHtml + '<div class="mh-row__result">' + r + '</div></div>';
  }).join('');
}

/* ── Player Card Sheet ── */
var playerSheetData = null;

async function openPlayerCard(uid) {
  if (!uid) return;
  var overlay = document.getElementById('playerSheetOverlay');
  var cardEl = document.getElementById('playerSheetCard');
  if (!overlay || !cardEl) return;

  // Show overlay with loading state
  cardEl.innerHTML = '<div class="player-sheet__loading">Loading...</div>';
  overlay.classList.add('active');

  try {
    var { data: player } = await supabase.from('profiles')
      .select('id, first_name, last_name, name, avatar_cutout_url, selected_cover, social_rating, skill_rating')
      .eq('id', uid).single();
    if (!player) { closePlayerSheet(); return; }

    var { data: stats } = await supabase.from('player_division_stats')
      .select('*').eq('user_id', uid);

    var playerDivStats = {};
    var bestDiv = '1v1', bestGames = 0;
    if (stats) stats.forEach(function(s) {
      playerDivStats[s.division] = s;
      if (s.games_count > bestGames) { bestGames = s.games_count; bestDiv = s.division; }
    });

    playerSheetData = { player: player, divStats: playerDivStats, activeDivision: bestGames > 0 ? bestDiv : '1v1' };
    renderPlayerSheet();
  } catch (err) {
    console.error('Failed to load player card:', err);
    closePlayerSheet();
  }
}

function renderPlayerSheet() {
  if (!playerSheetData) return;
  var cardEl = document.getElementById('playerSheetCard');
  var p = playerSheetData.player;
  var ds = playerSheetData.divStats[playerSheetData.activeDivision];

  cardEl.innerHTML = CareerCard.render({
    cardId: 'psc',
    firstName: p.first_name || p.name?.split(' ')[0] || '',
    lastName: p.last_name || p.name?.split(' ').slice(1).join(' ') || '',
    cutoutUrl: p.avatar_cutout_url,
    coverSlug: p.selected_cover || 'crossover',
    wins: ds?.wins || 0,
    losses: ds?.losses || 0,
    draws: ds?.draws || 0,
    skillRating: ds?.skill_rating ? Number(ds.skill_rating).toFixed(1) : '—',
    socialRating: p.social_rating ? Number(p.social_rating).toFixed(1) : '—',
    divisionLabel: playerSheetData.activeDivision.toUpperCase(),
    activeDivision: playerSheetData.activeDivision,
    showTabs: true,
    onTabClick: 'switchPlayerSheetDiv',
    showDeltas: false
  });
  requestAnimationFrame(function() { CareerCard.fitNames('psc'); });
}

function switchPlayerSheetDiv(dv) {
  if (!playerSheetData) return;
  playerSheetData.activeDivision = dv;
  renderPlayerSheet();
}

function closePlayerSheet() {
  document.getElementById('playerSheetOverlay').classList.remove('active');
  playerSheetData = null;
}

/* ── Photo Upload ── */
function openPhotoModal() { document.getElementById('photoModal').classList.add('active'); document.getElementById('photoPreview').classList.remove('has-image'); document.getElementById('photoProcessing').classList.remove('active'); var b = document.getElementById('photoUploadBtn'); b.textContent = 'Choose Photo'; b.disabled = false; b.style.display = ''; }
function closePhotoModal() { document.getElementById('photoModal').classList.remove('active'); }

async function handlePhotoSelect(e) {
  var f = e.target.files[0]; if (!f) return;
  var reader = new FileReader(); reader.onload = function(ev) { document.getElementById('photoPreviewImg').src = ev.target.result; document.getElementById('photoPreview').classList.add('has-image'); }; reader.readAsDataURL(f);
  var btn = document.getElementById('photoUploadBtn'), proc = document.getElementById('photoProcessing'), stat = document.getElementById('photoStatus');
  btn.disabled = true; btn.textContent = 'Uploading...';
  try {
    var ext = f.name.split('.').pop(), path = currentUser.id + '/avatar-' + Date.now() + '.' + ext;
    var upRes = await supabase.storage.from('avatars').upload(path, f, { upsert: true }); if (upRes.error) throw upRes.error;
    var urlData = supabase.storage.from('avatars').getPublicUrl(path);
    await supabase.from('profiles').update({ avatar_url: urlData.data.publicUrl }).eq('id', currentUser.id);
    currentProfile.avatar_url = urlData.data.publicUrl;
    btn.style.display = 'none'; proc.classList.add('active'); stat.textContent = 'Removing background...';
    var tk = null; var sd = await supabase.auth.getSession(); tk = sd.data.session ? sd.data.session.access_token : null;
    if (!tk) { var rd = await supabase.auth.refreshSession(); tk = rd.data.session ? rd.data.session.access_token : null; }
    var res = await fetch(SUPABASE_URL + '/functions/v1/avatar-process', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + tk, 'apikey': SUPABASE_ANON_KEY }, body: JSON.stringify({ imagePath: path }) });
    var result = await res.json(); if (!res.ok) throw new Error(result.error || 'Processing failed');
    currentProfile.avatar_cutout_url = result.cutoutUrl; stat.textContent = 'Done!';
    setTimeout(function() { closePhotoModal(); renderCard(); updateNavDrawerUser(); }, 600);
  } catch (err) { console.error('Photo error:', err); proc.classList.remove('active'); btn.style.display = ''; btn.disabled = false; btn.textContent = 'Try Again'; alert('Photo upload failed: ' + err.message); }
}
function openCoverPicker() { window.location.href = 'allnet-stars.html'; }

/* ── Init ── */
async function initCareerPage() {
  var sess = await supabase.auth.getSession();
  if (!sess.data.session) { window.location.href = 'allnet-app.html'; return; }
  currentUser = sess.data.session.user; currentProfile = await getUserProfile(currentUser.id);
  if (!currentProfile) { window.location.href = 'allnet-app.html'; return; }
  updateNavDrawerUser(); await loadDivisionStats(); renderCard(); loadMatchHistory();
}
initCareerPage();
</script>
