<!DOCTYPE html>
<html lang="en">
<head>

<meta property="og:site_name" content="AllNet">
<meta property="og:title" content="AllNet — Player Card">
<meta property="og:description" content="Check out this player's basketball career card on AllNet — the pickup basketball reputation network.">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Oswald:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --orange: #F74501; --border: #222; }
html, body { height: auto; overflow: auto; background: #000; color: #fff; font-family: 'DM Sans', sans-serif; -webkit-font-smoothing: antialiased; }

/* Top bar */
.pp-topbar { position: sticky; top: 0; z-index: 100; padding: 14px 16px; background: rgba(0,0,0,0.95); backdrop-filter: blur(16px); display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
.pp-topbar__logo { display: flex; align-items: center; gap: 8px; text-decoration: none; }
.pp-topbar__logo-text { font-family: 'Oswald', sans-serif; font-size: 22px; font-weight: 700; color: #fff; text-transform: uppercase; }
.pp-topbar__join { padding: 8px 20px; font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 13px; color: #fff; background: var(--orange); border: none; border-radius: 8px; cursor: pointer; text-decoration: none; transition: opacity 0.2s; }
.pp-topbar__join:hover { opacity: 0.85; }

/* Loading state */
.pp-loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 16px; }
.pp-loading__spinner { width: 40px; height: 40px; border: 3px solid #333; border-top-color: var(--orange); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.pp-loading__text { font-family: 'Montserrat', sans-serif; font-size: 14px; color: #666; }

/* Error state */
.pp-error { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 16px; text-align: center; padding: 24px; }
.pp-error__icon { font-size: 48px; }
.pp-error__title { font-family: 'Montserrat', sans-serif; font-size: 20px; font-weight: 700; }
.pp-error__sub { font-family: 'Montserrat', sans-serif; font-size: 14px; color: #888; max-width: 300px; line-height: 1.5; }

/* Badge area */
.pp-badge { text-align: center; padding: 20px 16px 0; }
.pp-badge-pill { display: inline-block; font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 700; color: var(--orange); background: rgba(247,69,1,0.1); border: 1px solid rgba(247,69,1,0.25); padding: 6px 16px; border-radius: 100px; }
.pp-badge-court { font-family: 'Montserrat', sans-serif; font-size: 12px; color: #888; margin-top: 8px; }

/* Card wrapper */
.pp-card { padding: 16px 16px 0; }

/* Stats row */
.pp-stats { display: flex; justify-content: center; gap: 24px; padding: 24px 16px 0; }
.pp-stat { text-align: center; }
.pp-stat__val { font-family: 'Montserrat', sans-serif; font-size: 20px; font-weight: 800; color: #fff; }
.pp-stat__label { font-family: 'Montserrat', sans-serif; font-size: 11px; font-weight: 600; color: #666; text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }

/* Match history */
.pp-matches { padding: 32px 16px 0; max-width: 375px; margin: 0 auto; }
.pp-matches__title { font-family: 'Montserrat', sans-serif; font-weight: 600; font-size: 14px; color: #fff; margin-bottom: 16px; }
.pp-match { background: #181818; border: 1px solid #2e2e2e; display: flex; align-items: center; padding: 14px 16px; margin-bottom: 8px; gap: 14px; }
.pp-match__format { font-family: 'Montserrat', sans-serif; font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 100px; white-space: nowrap; }
.pp-match__format--win { color: #22C55E; background: rgba(34,197,94,0.12); }
.pp-match__format--lose { color: #EF4444; background: rgba(239,68,68,0.12); }
.pp-match__format--draw { color: #FACC15; background: rgba(250,204,21,0.12); }
.pp-match__info { flex: 1; min-width: 0; }
.pp-match__opp { font-family: 'Montserrat', sans-serif; font-size: 14px; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pp-match__meta { font-family: 'Montserrat', sans-serif; font-size: 11px; color: #666; margin-top: 2px; }
.pp-match__empty { text-align: center; padding: 32px 16px; color: #555; font-family: 'Montserrat', sans-serif; font-size: 14px; }

/* CTA */
.pp-cta { padding: 40px 16px 48px; max-width: 375px; margin: 0 auto; text-align: center; }
.pp-cta__box { background: #111; border: 1px solid #2a2a2a; border-radius: 16px; padding: 28px 24px; }
.pp-cta__icon { font-size: 36px; margin-bottom: 12px; }
.pp-cta__title { font-family: 'Montserrat', sans-serif; font-size: 18px; font-weight: 800; text-transform: uppercase; margin-bottom: 6px; }
.pp-cta__sub { font-family: 'Montserrat', sans-serif; font-size: 13px; color: #999; line-height: 1.5; margin-bottom: 20px; }
.pp-cta__stars { font-family: 'Montserrat', sans-serif; font-size: 14px; font-weight: 700; color: var(--orange); margin-bottom: 16px; }
.pp-cta__btn { display: inline-block; padding: 14px 40px; font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 15px; color: #fff; background: var(--orange); border: none; border-radius: 10px; cursor: pointer; text-decoration: none; text-transform: uppercase; letter-spacing: 0.04em; transition: opacity 0.2s; }
.pp-cta__btn:hover { opacity: 0.85; }
</style>
</head>
<body>

<!-- Top Bar -->
<div class="pp-topbar">
  <a href="allnet-landing.html" class="pp-topbar__logo">
    <svg height="18" viewBox="0 0 685 318" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M546.941 97.7H653.081V121.712H613.757V219.5H586.439V121.712H546.941V97.7Z" fill="white"/><path d="M538.737 121.712H482.883V146.594H516.813V170.606H482.883V195.488H538.737V219.5H455.565V97.7H538.737V121.712Z" fill="white"/><path d="M407.304 97.7H434.622V219.5H407.304V185.744L362.238 144.854V219.5H334.92V97.7H362.238V108.314L407.304 149.03V97.7Z" fill="white"/><path d="M267.07 195.488H322.924V219.5H255.064L239.752 204.188V97.7H267.07V195.488Z" fill="white"/><path d="M172.423 195.488H228.277V219.5H160.417L145.105 204.188V97.7H172.423V195.488Z" fill="white"/><path d="M109.74 97.7L125.052 113.012V219.5H97.734V194.792H58.236V291.5L30.918 307.5V113.012L46.23 97.7H109.74ZM58.236 170.606H97.734V121.712H58.236V170.606Z" fill="white"/></svg>
    <span class="pp-topbar__logo-text">AllNet</span>
  </a>
  <a href="allnet-landing.html" class="pp-topbar__join" id="topJoinBtn">Join AllNet</a>
</div>

<!-- Content area (JS will populate) -->
<div id="pageContent">
  <div class="pp-loading">
    <div class="pp-loading__spinner"></div>
    <div class="pp-loading__text">Loading player card...</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/career-card.js"></script>
<script>
/* ═══════════════════════════════
   PUBLIC PLAYER PAGE
   No auth required — anon reads
   ═══════════════════════════════ */

var SUPABASE_URL = 'https://orrpowyewsioyxztwkdq.supabase.co';
var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9ycnBvd3lld3Npb3l4enR3a2RxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3ODAwNzMsImV4cCI6MjA4OTM1NjA3M30.4K6ZT-eNOGbvXxJkN_Dt7aLv80GlC0rrTLcIUPExwp0';

var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function getSlug() {
  var params = new URLSearchParams(window.location.search);
  return params.get('slug') || '';
}

function getRef() {
  var params = new URLSearchParams(window.location.search);
  return params.get('ref') || '';
}

function timeAgo(date) {
  var s = Math.floor((Date.now() - date.getTime()) / 1000);
  if (s < 60) return 'just now';
  var m = Math.floor(s / 60); if (m < 60) return m + 'm ago';
  var h = Math.floor(m / 60); if (h < 24) return h + 'h ago';
  var d = Math.floor(h / 24); if (d < 30) return d + 'd ago';
  var mo = Math.floor(d / 30); return mo + 'mo ago';
}

function showError(title, sub) {
  document.getElementById('pageContent').innerHTML =
    '<div class="pp-error">' +
      '<div class="pp-error__icon">🏀</div>' +
      '<div class="pp-error__title">' + title + '</div>' +
      '<div class="pp-error__sub">' + sub + '</div>' +
    '</div>';
}

async function loadPlayer() {
  var slug = getSlug();
  if (!slug) { showError('Player not found', 'This link might be broken. Check the URL and try again.'); return; }

  // Look up by username or short_code
  var profile = null;
  var { data: byUsername } = await sb.from('profiles')
    .select('id,name,first_name,last_name,avatar_url,avatar_cutout_url,selected_cover,is_founding_hooper,founding_number,wins,losses,draws,skill_rating,social_rating,total_checkins,unique_courts,days_active,short_code,username')
    .eq('username', slug.toLowerCase())
    .maybeSingle();

  if (byUsername) {
    profile = byUsername;
  } else {
    var { data: byCode } = await sb.from('profiles')
      .select('id,name,first_name,last_name,avatar_url,avatar_cutout_url,selected_cover,is_founding_hooper,founding_number,wins,losses,draws,skill_rating,social_rating,total_checkins,unique_courts,days_active,short_code,username')
      .eq('short_code', slug.toUpperCase())
      .maybeSingle();
    profile = byCode;
  }

  if (!profile) { showError('Player not found', 'No player with that username or code exists. They may have changed it.'); return; }

  // Update page title
  var displayName = (profile.first_name || '') + ' ' + (profile.last_name || '');
  document.title = 'AllNet — ' + displayName.trim();

  // Fetch division stats, checkins, and match history in parallel
  var [divRes, checkinRes, matchData] = await Promise.all([
    sb.from('player_division_stats').select('*').eq('user_id', profile.id),
    sb.from('checkins').select('court_id, courts(name)').eq('user_id', profile.id),
    loadMatchHistory(profile.id)
  ]);

  // Division stats
  var divisionStats = {};
  if (divRes.data) divRes.data.forEach(function(r) { divisionStats[r.division] = r; });
  var ds = divisionStats['1v1'] || {};

  // Most played court
  var mostPlayed = null;
  if (checkinRes.data && checkinRes.data.length > 0) {
    var counts = {};
    checkinRes.data.forEach(function(c) { var n = c.courts && c.courts.name; if (n) counts[n] = (counts[n] || 0) + 1; });
    var best = Object.entries(counts).sort(function(a, b) { return b[1] - a[1]; })[0];
    if (best) mostPlayed = best[0];
  }

  // Referral info for CTA
  var ref = getRef() || profile.short_code || '';
  var referrerName = profile.first_name || profile.name || 'This player';
  var joinUrl = 'allnet-landing.html?ref=' + encodeURIComponent(ref);

  // Update top join button
  document.getElementById('topJoinBtn').href = joinUrl;

  // Build page HTML
  var html = '';

  // Badge
  html += '<div class="pp-badge">';
  if (profile.is_founding_hooper) {
    html += '<div class="pp-badge-pill">🏅 Founding Hooper #' + (profile.founding_number || '') + '</div>';
  }
  if (mostPlayed) {
    html += '<div class="pp-badge-court">📍 Most played: ' + mostPlayed + '</div>';
  }
  html += '</div>';

  // Career card
  html += '<div class="pp-card"><div class="cc-border"><div class="cc" id="playerCard"></div></div></div>';

  // Stats row
  html += '<div class="pp-stats">';
  html += '<div class="pp-stat"><div class="pp-stat__val">' + (profile.total_checkins || 0) + '</div><div class="pp-stat__label">Check-ins</div></div>';
  html += '<div class="pp-stat"><div class="pp-stat__val">' + (profile.unique_courts || 0) + '</div><div class="pp-stat__label">Courts</div></div>';
  html += '<div class="pp-stat"><div class="pp-stat__val">' + (profile.days_active || 0) + '</div><div class="pp-stat__label">Days Active</div></div>';
  html += '</div>';

  // Match history
  html += '<div class="pp-matches">';
  html += '<div class="pp-matches__title">MATCH HISTORY (' + matchData.length + ')</div>';
  if (matchData.length === 0) {
    html += '<div class="pp-match__empty">No matches yet — they\'re getting started.</div>';
  } else {
    matchData.forEach(function(m) {
      var resultClass = m.result === 'WIN' ? '--win' : (m.result === 'LOSE' ? '--lose' : '--draw');
      html += '<div class="pp-match">';
      html += '<div class="pp-match__format pp-match__format' + resultClass + '">' + m.result + '</div>';
      html += '<div class="pp-match__info">';
      html += '<div class="pp-match__opp">' + m.oppName + '</div>';
      html += '<div class="pp-match__meta">' + m.format.toUpperCase() + ' · ' + m.timeStr + '</div>';
      html += '</div></div>';
    });
  }
  html += '</div>';

  // CTA
  html += '<div class="pp-cta"><div class="pp-cta__box">';
  html += '<div class="pp-cta__icon">🏀</div>';
  html += '<div class="pp-cta__title">Join AllNet</div>';
  html += '<div class="pp-cta__sub">Build your own basketball reputation. Find better pickup games. Earn community standing.</div>';
  html += '<div class="pp-cta__stars">⭐ Earn 500 Stars when you join with ' + referrerName + '\'s invite</div>';
  html += '<a href="' + joinUrl + '" class="pp-cta__btn">Get Started</a>';
  html += '</div></div>';

  document.getElementById('pageContent').innerHTML = html;

  // Render career card after DOM is in place
  var cardEl = document.getElementById('playerCard');
  if (cardEl) {
    cardEl.innerHTML = CareerCard.render({
      cardId: 'psc',
      firstName: profile.first_name || profile.name.split(' ')[0] || '',
      lastName: profile.last_name || profile.name.split(' ').slice(1).join(' ') || '',
      cutoutUrl: profile.avatar_cutout_url,
      coverSlug: profile.selected_cover || 'crossover',
      wins: ds.wins || profile.wins || 0,
      losses: ds.losses || profile.losses || 0,
      draws: ds.draws || profile.draws || 0,
      skillRating: ds.skill_rating ? Number(ds.skill_rating).toFixed(1) : (profile.skill_rating ? Number(profile.skill_rating).toFixed(1) : '—'),
      socialRating: profile.social_rating ? Number(profile.social_rating).toFixed(1) : '—',
      divisionLabel: '1V1',
      activeDivision: '1v1',
      showTabs: false,
      showDeltas: false
    });
    requestAnimationFrame(function() { CareerCard.fitNames('psc'); });
  }
}

async function loadMatchHistory(userId) {
  try {
    var pgRes = await sb.from('game_players').select('game_id,team').eq('user_id', userId);
    var pg = pgRes.data;
    if (!pg || !pg.length) return [];

    var gids = pg.map(function(p) { return p.game_id; });
    var tm = {};
    pg.forEach(function(p) { tm[p.game_id] = p.team; });

    var gRes = await sb.from('game_sessions').select('id,format,winner,ended_at')
      .in('id', gids).in('status', ['completed','nulled'])
      .order('ended_at', { ascending: false }).limit(10);
    var games = gRes.data;
    if (!games || !games.length) return [];

    var apRes = await sb.from('game_players').select('game_id,user_id,team').in('game_id', gids);
    var ap = apRes.data || [];

    var oids = new Set();
    ap.forEach(function(a) { if (a.user_id !== userId) oids.add(a.user_id); });

    var op = {};
    if (oids.size > 0) {
      var prRes = await sb.from('profiles').select('id,name,first_name,last_name').in('id', Array.from(oids));
      if (prRes.data) prRes.data.forEach(function(p) { op[p.id] = p; });
    }

    return games.map(function(g) {
      var mt = tm[g.id];
      var r = 'DRAW';
      if (g.winner === 'team_' + mt) r = 'WIN';
      else if (g.winner && g.winner !== 'draw' && g.winner !== 'null') r = 'LOSE';

      var isTeamGame = g.format !== '1v1';
      var opp = null;
      if (ap.length) {
        var x = ap.find(function(a) { return a.game_id === g.id && a.user_id !== userId && a.team !== mt; })
             || ap.find(function(a) { return a.game_id === g.id && a.user_id !== userId; });
        if (x) opp = op[x.user_id];
      }

      var oppName = isTeamGame ? g.format.toUpperCase() : (opp ? (opp.first_name ? opp.first_name + ' ' + (opp.last_name || '') : opp.name) : 'Unknown');

      return {
        result: r,
        oppName: oppName.trim(),
        format: g.format,
        timeStr: g.ended_at ? timeAgo(new Date(g.ended_at)) : ''
      };
    });
  } catch (e) {
    console.error('Match history error:', e);
    return [];
  }
}

// Check RLS for game tables — they need public SELECT
loadPlayer();
</script>
</body>
</html>
